<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CLOSE ENOUGH TRIVIA - DIAGNOSTIC MODE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root{
--gold:#ffd700;
--gold-dark:#9a6800;
--gold-mid:#e6a800;
--purple-deep:#110025;
--purple-mid:#3a007a;
--purple-bright:#6a0dad;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Barlow','Trebuchet MS',sans-serif;
font-weight:400;
background:linear-gradient(150deg,#5a0a9e 0%,#1a0035 60%,#0d001f 100%);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

/* Ambient glow */
body::before{
content:'';
position:fixed;
top:-10%;
left:50%;
transform:translateX(-50%);
width:90vw;
height:70vw;
background:radial-gradient(ellipse,rgba(130,40,220,0.18) 0%,transparent 65%);
pointer-events:none;
z-index:0;
}

#app{
width:95%;
max-width:1200px;
position:relative;
z-index:1;
padding:30px 0;
animation:fadeIn 0.35s ease;
}

/* DEBUG LOG STYLING */
#debugLog {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.85);
    color: #00ff00;
    font-family: monospace;
    padding: 10px;
    border-radius: 5px;
    max-width: 400px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 12px;
    z-index: 9999;
    border: 1px solid #333;
    pointer-events: none; /* Let clicks pass through */
    opacity: 0.8;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.screen{
display:flex;
gap:0;
min-height:72vh;
}

.info{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:30px 40px 30px 10px;
border-right:1px solid rgba(255,255,255,0.1);
}

.action{
flex:1;
display:flex;
flex-direction:column;
justify-content:flex-start;
gap:16px;
align-items:center;
padding:30px 10px 30px 40px;
}

/* TYPOGRAPHY */
h1{
font-family:'Oswald','Trebuchet MS',sans-serif;
font-size:54px;
font-weight:700;
margin:0 0 16px 0;
letter-spacing:2px;
text-transform:uppercase;
color:var(--gold);
text-shadow:0 0 40px rgba(255,215,0,0.35),0 3px 0 rgba(0,0,0,0.4);
line-height:1.05;
}

h2{
font-family:'Oswald','Trebuchet MS',sans-serif;
font-size:26px;
font-weight:600;
margin:0 0 16px 0;
line-height:1.35;
letter-spacing:0.3px;
}

.q-label{
font-family:'Oswald',sans-serif;
font-size:13px;
font-weight:600;
letter-spacing:3px;
text-transform:uppercase;
color:rgba(255,215,0,0.65);
margin-bottom:10px;
}

.hint{
font-size:15px;
font-style:italic;
color:rgba(255,255,255,0.6);
margin-top:12px;
line-height:1.5;
}

/* BUTTONS */
button{
padding:13px 28px;
font-family:'Oswald','Trebuchet MS',sans-serif;
font-size:17px;
font-weight:600;
letter-spacing:1.5px;
text-transform:uppercase;
border:none;
border-radius:10px;
background:linear-gradient(to bottom,#ffd700,#e09800);
color:#160030;
cursor:pointer;
box-shadow:0 5px 0 var(--gold-dark),0 8px 20px rgba(0,0,0,0.35);
transition:all .12s ease;
white-space:nowrap;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 7px 0 var(--gold-dark),0 12px 28px rgba(0,0,0,0.4);
background:linear-gradient(to bottom,#ffe033,#f5b200);
}

button:active{
transform:translateY(4px);
box-shadow:0 2px 0 var(--gold-dark),0 4px 8px rgba(0,0,0,0.2);
}

button:disabled {
    filter: grayscale(1);
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

/* PPN BOX */
.ppn{
width:100%;
margin-top:16px;
padding:16px 20px;
background:rgba(255,255,255,0.055);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
text-align:center;
font-size:16px;
font-weight:500;
color:rgba(255,255,255,0.8);
backdrop-filter:blur(4px);
}

.ppn span{
font-family:'Oswald','Trebuchet MS',sans-serif;
font-size:40px;
font-weight:700;
color:var(--gold);
text-shadow:0 0 16px rgba(255,215,0,0.55);
display:block;
margin-top:3px;
line-height:1;
}

.turn-indicator{
display:inline-block;
margin-bottom:18px;
padding:5px 16px;
font-family:'Oswald',sans-serif;
font-size:13px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
color:#160030;
background:var(--gold);
border-radius:20px;
}

.center-screen{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
min-height:65vh;
gap:24px;
}

.title-btns{
display:flex;
gap:16px;
flex-wrap:wrap;
justify-content:center;
margin-top:8px;
}

.score-card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.13);
border-radius:16px;
padding:22px 28px;
margin:14px 0;
font-size:19px;
line-height:1.7;
width:100%;
max-width:600px;
}

.score-card .pts-won{
font-family:'Oswald',sans-serif;
font-size:30px;
font-weight:700;
color:var(--gold);
text-shadow:0 0 10px rgba(255,215,0,0.4);
}

.score-card .no-pts{
font-size:20px;
opacity:0.75;
}

.score-label{
font-family:'Oswald',sans-serif;
font-size:20px;
font-weight:600;
letter-spacing:0.5px;
margin-top:8px;
}

.answer-wrap{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
width:100%;
padding:20px 0;
animation:fadeIn 0.3s ease;
}

.ruler-wrap{
width:100%;
background:rgba(0,0,0,0.2);
border:1px solid rgba(255,255,255,0.08);
border-radius:12px;
padding:8px 0 4px 0;
margin-bottom:8px;
}

/* BONUS LIST STYLING */
.bonus-name{
padding:7px 10px;
margin:3px 0;
border-radius:8px;
transition:background 0.12s;
font-size:17px;
cursor:pointer;
}

.bonus-grid{
  width:100%;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:6px 20px;
}

@media (max-width: 700px){
  .bonus-grid{
