// STEP 3: THE GRID
function renderBonusGrid(mode) {
    AudioEngine.playTurnBellLow();
    const q = Game.currentBonusQ;
    const container = document.getElementById("app");
    
    let targetIsTruth = (mode === 'real'); 
    let headerText = targetIsTruth ? "CLICK THE REAL ONES" : "FAKE ANSWERS ONLY!";
    let bonusCap = targetIsTruth ? 8 : 6;
    let subText = targetIsTruth ? "Pick up to 8 options and earn 25 points for each CORRECT one you choose!" : "Pick up to 6 options and earn 25 points for each FAKE one you choose!";

    let choices = [];
    if (Game.savedBonus && Game.savedBonus.id === q.id) {
        choices = Game.savedBonus.list;
    } else {
        let rawList = [];
        for(let i=1; i<=14; i++) {
            if(q[`choice_${i}_text`]) {
                let isFact = q[`choice_${i}_correct`].toLowerCase() === 'true';
                rawList.push({ txt: q[`choice_${i}_text`], isFact: isFact, id: i });
            }
        }
        choices = rawList.sort(() => Math.random() - 0.5);
        Game.savedBonus = { id: q.id, list: choices };
    }

    container.innerHTML = `
        <div class="screen-container">
            <div class="left-panel" style="padding-bottom:15px;">
                <h2 style="font-size:41px;">${q.question_text || ""}</h2>
                <div class="hint" style="font-size:16px; margin-bottom:0;">${subText}</div>
            </div>
            <div class="right-panel" style="padding-top:15px;">
                <h2 style="color:var(--gold); margin:0 0 8px 0; text-align:center;">${headerText}</h2>
                <div class="bonus-grid">
                    ${choices.map(c => `<div class="bonus-item" onclick="toggleBonus(this, ${c.id})">${c.txt}</div>`).join('')}
                </div>
                <div class="ppn-row"><div class="ppn-label">Potential Points:</div><div class="ppn-display" id="bonusPpn">0</div></div>
                <button onclick="submitBonus('${mode}')">SUBMIT ANSWER</button>
            </div>
        </div>
    `;

    Game.bonusSelection = new Set();
    
    window.toggleBonus = function(el, id) {
        if(Game.bonusSelection.has(id)) {
            Game.bonusSelection.delete(id);
            el.classList.remove('active');
            AudioEngine.playMapClick(Game.bonusSelection.size, false);
        } else {
            if(Game.bonusSelection.size >= bonusCap) return; 
            Game.bonusSelection.add(id);
            el.classList.add('active');
            AudioEngine.playMapClick(Game.bonusSelection.size, true);
        }
        document.getElementById("bonusPpn").innerText = Game.bonusSelection.size * 25;
    };

    window.submitBonus = function(mode) {
        const targetIsTruth = (mode === 'real');
        
        let correctCount = 0;
        let incorrectCount = 0;
        let totalPossibleCorrect = 0;

        choices.forEach(c => {
            if (targetIsTruth && c.isFact) totalPossibleCorrect++;
            if (!targetIsTruth && !c.isFact) totalPossibleCorrect++;
        });

        Game.bonusSelection.forEach(id => {
            const c = choices.find(ch => ch.id === id);
            const isCorrectSelection = (targetIsTruth && c.isFact) || (!targetIsTruth && !c.isFact);
            
            if (isCorrectSelection) correctCount++;
            else incorrectCount++;
        });

        const pts = correctCount * 25;

        let feedbackHeader = null;
        if (Game.mode === 1) {
            if (correctCount === totalPossibleCorrect && incorrectCount === 0) {
                feedbackHeader = "WOW, YOU GOT EACH ONE! YOU RECEIVE...";
            } else if (correctCount > 0 && incorrectCount === 0) {
                feedbackHeader = "GREAT JOB! YOU GOT...";
            } else if (correctCount > 0 && incorrectCount > 0) {
                feedbackHeader = "CLOSE ENOUGH! YOU GOT...";
            } else if (correctCount === 0 && incorrectCount > 0) {
                feedbackHeader = "NOT A SINGLE ONE. SORRY, YOU GOT...";
            } else {
                feedbackHeader = "SORRY, YOU GOT...";
            }
        }

        let realList = choices.filter(c => c.isFact).map(c => `<div class="bonus-list-item">${c.txt}</div>`).join('');
        let fakeList = choices.filter(c => !c.isFact).map(c => `<div class="bonus-list-item">${c.txt}</div>`).join('');

        if (Game.mode === 1) {
            showBonusResult1P(pts, choices, targetIsTruth, correctCount, incorrectCount, totalPossibleCorrect, q, feedbackHeader);
        } else {
            // Save this player's bonus data
            Game.bonusPlayerData.push({
                picks: new Set(Game.bonusSelection),
                targetIsTruth: targetIsTruth,
                pts: pts
            });

            if (Game.player === 0) {
                // P1 done — store temp score, transition to P2
                AudioEngine.playTurnBellLow();
                Game.tempScore = pts;
                Game.player = 1;
                showReadyScreen();
            } else {
                // P2 done — commit scores, show the grid
                AudioEngine.playNeutralBell();
                Game.scores[0] += Game.tempScore;
                Game.scores[1] += pts;
                Game.player = 0;
                Game.index++;
                showBonusResult2P(choices, q);
            }
        }
    };
}

// --- 1P BONUS RESULT ANIMATION ---
function showBonusResult1P(pts, choices, targetIsTruth, correctCount, incorrectCount, totalPossibleCorrect, q, feedbackHeader) {
    // Sound
    if (pts > 0) AudioEngine.playBonusWin(); else AudioEngine.playLoss();

    // Score update
    Game.scores[0] += pts;
    Game.index++;

    // Categorize all choices into picked vs unpicked
    const picked = [];
    const unpicked = [];
    choices.forEach(c => {
        const wasPicked = Game.bonusSelection.has(c.id);
        const isCorrect = (targetIsTruth && c.isFact) || (!targetIsTruth && !c.isFact);
        if (wasPicked) picked.push({ txt: c.txt, correct: isCorrect, isFact: c.isFact });
        else unpicked.push({ txt: c.txt, correct: isCorrect, isFact: c.isFact });
    });

    const scoreHTML = `<div class="score-box-1p"><div class="score-label">YOUR TOTAL SCORE:</div><div class="score-val">${Game.scores[0]}</div></div>`;

    // Animation timing
    const stagger = 0.15;

    // PICKED items — fly from bottom
    const pickedHTML = picked.map((c, i) => {
        const bg = c.correct ? 'rgba(90,10,158,0.85)' : 'rgba(120,120,120,0.5)';
        const textColor = c.correct ? 'var(--gold)' : 'white';
        const tag = c.isFact
            ? `<span style="color:#00dd44; font-weight:600; margin-left:6px;">(REAL)</span>`
            : `<span style="color:#ff4444; font-weight:600; margin-left:6px;">(FAKE)</span>`;
        return `<div class="bonus-anim-item fly-bottom" style="background:${bg}; color:${textColor}; animation-delay:${(i * stagger).toFixed(2)}s"><span>${c.txt}${tag}</span></div>`;
    }).join('');

    // "YOU DIDN'T PICK" header delay
    const didntPickDelay = picked.length * stagger + 0.4;

    // UNPICKED items — fly from right
    const unpickedHTML = unpicked.map((c, i) => {
        const tag = c.isFact
            ? `<span style="color:#00dd44; font-weight:600; margin-left:6px;">(REAL)</span>`
            : `<span style="color:#ff4444; font-weight:600; margin-left:6px;">(FAKE)</span>`;
        return `<div class="bonus-anim-item fly-right" style="background:rgba(0,0,0,0.7); color:rgba(170,170,170,0.85); animation-delay:${(didntPickDelay + i * stagger).toFixed(2)}s"><span>${c.txt}${tag}</span></div>`;
    }).join('');

    // Finale delay — after all animations complete
    const finaleDelay = didntPickDelay + unpicked.length * stagger + 0.5;

    document.getElementById("app").innerHTML = `
        <div class="bonus-anim-section">
            <div class="bonus-anim-header" style="animation-delay:0s;">YOU PICKED:</div>
            <div class="bonus-anim-grid">${pickedHTML}</div>
            <div class="bonus-anim-header" style="animation-delay:${(didntPickDelay - 0.2).toFixed(2)}s;">YOU DIDN'T PICK:</div>
            <div class="bonus-anim-grid">${unpickedHTML}</div>
        </div>
        <div class="bonus-finale" style="animation-delay:${finaleDelay.toFixed(2)}s;">
            <h1>${feedbackHeader}</h1>
            <h2>+${pts} Points</h2>
            <div style="width:90%; margin:20px auto;">${scoreHTML}</div>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
    `;
}

// --- 2P BONUS RESULT GRID ---
function showBonusResult2P(choices, q) {
    const players = Game.bonusPlayerData;

    // Separate into real and fake
    const realAnswers = choices.filter(c => c.isFact);
    const fakeAnswers = choices.filter(c => !c.isFact);

    // For each answer, build tag data: {playerIdx, green, label}
    function buildTags(answer) {
        const tags = [];
        players.forEach((p, pi) => {
            if (!p.picks.has(answer.id)) return;
            const isCorrect = (p.targetIsTruth && answer.isFact) || (!p.targetIsTruth && !answer.isFact);
            tags.push({ playerIdx: pi, green: isCorrect, label: `${pi+1}P +${isCorrect ? 25 : 0}pts` });
        });
        // Greens first, then reds
        const greens = tags.filter(t => t.green);
        const reds = tags.filter(t => !t.green);
        return [...greens, ...reds];
    }

    // Build answer bar HTML
    function answerBarHTML(answer, idx, prefix, deferred) {
        const id = `${prefix}_${idx}`;
        const animClass = deferred ? '' : 'fly-bottom';
        return `<div id="${id}" class="bonus-anim-item ${animClass}" style="background:rgba(90,10,158,0.85); color:white; animation-delay:${(idx * 0.15).toFixed(2)}s; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <span>${answer.txt}</span>
            <span id="${id}_tags" style="display:inline-flex; gap:8px; flex-wrap:wrap;"></span>
        </div>`;
    }

    const realBarsHTML = realAnswers.map((c, i) => answerBarHTML(c, i, 'real', false)).join('');
    const fakeBarsHTML = fakeAnswers.map((c, i) => answerBarHTML(c, i, 'fake', true)).join('');

    // Winner text
    const p1 = Game.scores[0], p2 = Game.scores[1];
    let winnerText = "IT'S A TIE!";
    if (p1 > p2) winnerText = "PLAYER 1 WINS!";
    else if (p2 > p1) winnerText = "PLAYER 2 WINS!";

    const scoreHTML = `<div style="display:flex; gap:20px; width:100%;">
        <div class="score-box"><div class="score-label">PLAYER 1'S SCORE:</div><div class="score-val">${p1}</div></div>
        <div class="score-box"><div class="score-label">PLAYER 2'S SCORE:</div><div class="score-val">${p2}</div></div>
    </div>`;

    document.getElementById("app").innerHTML = `
        <div class="bonus-anim-section">
            <div class="bonus-anim-header" style="animation-delay:0s;">REAL ANSWERS:</div>
            <div class="bonus-anim-grid" id="realGrid">${realBarsHTML}</div>
            <div class="bonus-anim-header" id="fakeHeader" style="opacity:0;">FAKE ANSWERS:</div>
            <div class="bonus-anim-grid" id="fakeGrid" style="opacity:0;">${fakeBarsHTML}</div>
        </div>
        <div id="twoPlayerFinale" style="display:none; text-align:center;">
            <h1 style="font-size:52px; color:var(--gold); animation: flashOnOff 1s linear infinite;">${winnerText}</h1>
            <div style="width:90%; margin:15px auto;">${scoreHTML}</div>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
    `;

    // --- ANIMATION SEQUENCER ---
    // Animate tags for a list of answers, then call onDone
    function animateTags(answers, prefix, startDelay, onDone) {
        let delay = startDelay;
        const tagGroups = answers.map((c, i) => ({ idx: i, tags: buildTags(c) })).filter(g => g.tags.length > 0);

        tagGroups.forEach((group, gi) => {
            group.tags.forEach((tag, ti) => {
                setTimeout(() => {
                    const container = document.getElementById(`${prefix}_${group.idx}_tags`);
                    if (!container) return;
                    const color = tag.green ? '#00dd44' : '#ff4444';
                    const span = document.createElement('span');
                    span.style.cssText = `color:${color}; font-family:'Oswald',sans-serif; font-size:14px; font-weight:600; white-space:nowrap;`;
                    span.textContent = tag.label;
                    container.appendChild(span);
                    if (tag.green) AudioEngine.playTagBell();
                    else AudioEngine.playTagBzz();
                }, delay * 1000);
                delay += 0.2;
            });
            // 0.3s gap after this line completes (unless it's the last group)
            if (gi < tagGroups.length - 1) delay += 0.3;
        });

        // Call onDone after all tags + buffer
        if (tagGroups.length > 0) delay += 0.2;
        setTimeout(onDone, delay * 1000);
    }

    // Phase timing
    const realFlyDuration = realAnswers.length * 0.15 + 0.4;

    // Phase 1: After real answers fly in, animate real tags
    animateTags(realAnswers, 'real', realFlyDuration, function() {
        // Wait 0.2s, show FAKE ANSWERS header + grid
        setTimeout(function() {
            const fakeHeader = document.getElementById('fakeHeader');
            const fakeGrid = document.getElementById('fakeGrid');
            if (fakeHeader) { fakeHeader.style.opacity = '1'; fakeHeader.style.animation = 'fadeIn 0.3s forwards'; }
            if (fakeGrid) {
                fakeGrid.style.opacity = '1';
                // Trigger fly animations on fake bars now
                fakeGrid.querySelectorAll('.bonus-anim-item').forEach((el, i) => {
                    el.style.animationDelay = (i * 0.15).toFixed(2) + 's';
                    el.classList.add('fly-bottom');
                });
            }

            const fakeFlyDuration = fakeAnswers.length * 0.15 + 0.4;

            // Phase 2: After fake answers fly in, animate fake tags
            animateTags(fakeAnswers, 'fake', fakeFlyDuration, function() {
                // Phase 3: Wait 0.2s, show finale
                setTimeout(function() {
                    const finale = document.getElementById('twoPlayerFinale');
                    if (finale) finale.style.display = 'block';
                    AudioEngine.playBonusWin();
                }, 200);
            });
        }, 200);
    });
}

// --- RENDERER: PINCH ---
function renderPinch(q, container) {
    function formatValue(val) {
        const unit = (q.unit || "").toLowerCase();
        if (unit === 'month' || q.id === 'pinch_G') { 
            const months = ["", "JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            let i = Math.round(val);
            if(i >= 1 && i <= 12) return months[i]; return val;
        }
        if (unit === 'currency' || unit === '$' || unit === 'usd') return "$" + Math.round(val).toLocaleString();
        if (unit === 'percent' || unit === '%') return Math.round(val) + "%";
        if (unit === 'time' || q.id === 'pinch_J') {
            const m = Math.floor(val / 60); const s = Math.round(val % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        return Math.round(val); 
    }

    container.innerHTML = `
        <div class="screen-container">
            <div class="left-panel">
                <h2>${q.question_text || "Question"}</h2>
                <div class="hint">Choose a single number or a range of numbers.</div>
            </div>
            <div class="right-panel">
                <div class="selection-display" id="selectionDisp">SELECTED: 0</div>
                <div id="rulerContainer"></div>
                <div class="ppn-row"><div class="ppn-label">Potential Points:</div><div class="ppn-display" id="ppnDisplay">0</div></div>
                <button onclick="Game.submitPinch()">SUBMIT ANSWER</button>
            </div>
        </div>
    `;

    const min = +q.min_value; const max = +q.max_value; 
    const labelInt = +q.label_interval || 10;
    let majorInt = +q.major_tick; if(!majorInt) majorInt = labelInt;
    let minorInt = +q.minor_tick; if(!minorInt) minorInt = majorInt;
    const snap = minorInt;
    const trueVal = +q.true_value;
    const cost = +q.points_per_extra_unit || 1;
    const maxSpan = +q.max_width_units || 0;
    
    let l = +q.default_start || min; let r = +q.default_end || max;
    let lastSoundVal = -999; 

    const width = 600, height = 150;
    const svg = d3.select("#rulerContainer").append("svg").attr("width", "100%").attr("height", "100%").attr("viewBox", `0 0 ${width} ${height}`);
    const x = d3.scaleLinear().domain([min, max]).range([20, width-20]);
    const tickGroup = svg.append("g").attr("transform", "translate(0, 80)");

    if(minorInt) tickGroup.append("g").call(d3.axisBottom(x).tickValues(d3.range(min, max + snap, minorInt)).tickSize(6).tickFormat("")).style("color", "rgba(255,255,255,0.3)");
    if(majorInt) tickGroup.append("g").call(d3.axisBottom(x).tickValues(d3.range(min, max + snap, majorInt)).tickSize(12).tickFormat("")).style("color", "rgba(255,255,255,0.6)");
    tickGroup.append("g").call(d3.axisBottom(x).tickValues(d3.range(min, max + snap, labelInt)).tickSize(20).tickFormat(d => formatValue(d))).style("color", "white").style("font-size", "18px").style("font-family", "Barlow");

    // ADDED CLASS pinch-bar TO PREVENT CSS CONFLICTS - FORCED INLINE
    const bar = svg.append("rect")
        .attr("class", "pinch-bar")
        .attr("y", 30).attr("height", 50)
        .style("fill", "rgba(255,215,0,0.3)")
        .style("stroke", "#ffd700")
        .style("stroke-width", "3px")
        .style("cursor", "grab");
    
    // Explicitly set width to prevent weird rendering
    bar.attr("width", 0).attr("x", 20);

    function update() {
        const pxW = x(r) - x(l); const minPx = 15;
        const txtL = formatValue(l); const txtR = formatValue(r);
        if (pxW < minPx) { bar.attr("x", x(l) - minPx/2).attr("width", minPx); document.getElementById("selectionDisp").innerText = `SELECTED: ${txtL}`; } 
        else { bar.attr("x", x(l)).attr("width", pxW); document.getElementById("selectionDisp").innerText = `SELECTED: [ ${txtL} - ${txtR} ]`; }
        const rangeUnits = (r - l) / snap;
        const ppn = Math.max(5, Math.round(100 - (rangeUnits * cost)));
        document.getElementById("ppnDisplay").innerText = ppn;
        return ppn;
    }
    update();

    // --- PINCH TUTORIAL: Pulsing edge indicators on first pinch per player ---
    let tutorialActive = false;
    let edgeLeft = null, edgeRight = null;

    function addPulsingEdges() {
        const barX = +bar.attr("x"), barW = +bar.attr("width");
        edgeLeft = svg.append("rect")
            .attr("x", barX - 6).attr("y", 20).attr("width", 14).attr("height", 70)
            .attr("rx", 7).style("fill", "#ffd700").style("pointer-events", "none")
            .style("animation", "edgePulse 0.6s ease-in-out infinite");
        edgeRight = svg.append("rect")
            .attr("x", barX + barW - 8).attr("y", 20).attr("width", 14).attr("height", 70)
            .attr("rx", 7).style("fill", "#ffd700").style("pointer-events", "none")
            .style("animation", "edgePulse 0.6s ease-in-out infinite");
        tutorialActive = true;
    }

    function removePulsingEdges() {
        if (edgeLeft) { edgeLeft.remove(); edgeLeft = null; }
        if (edgeRight) { edgeRight.remove(); edgeRight = null; }
        tutorialActive = false;
    }

    // Show on first pinch for each player this cycle
    if (!Game.pinchTutorialShown.has(Game.player)) {
        Game.pinchTutorialShown.add(Game.player);
        addPulsingEdges();
    }

    let dragMode = null, startX, startL, startR;
    
    function startDrag(mx) {
        if (tutorialActive) removePulsingEdges();
        const visualL = (x(r)-x(l) < 15) ? x(l)-7.5 : x(l); const visualW = (x(r)-x(l) < 15) ? 15 : x(r)-x(l);
        const edgeZone = Math.min(20, visualW / 3); 
        if(mx < visualL + edgeZone) dragMode = 'left'; else if(mx > visualL + visualW - edgeZone) dragMode = 'right'; else dragMode = 'move';
        startX = mx; startL = l; startR = r; lastSoundVal = dragMode === 'right' ? r : l;
    }

    bar.on("mousedown", e => {
        startDrag(d3.pointer(e)[0]);
        d3.select(window).on("mousemove", onDrag).on("mouseup", stopDrag);
    });

    // TOUCH SUPPORT FOR PINCH BAR
    bar.node().addEventListener("touchstart", function(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const pt = d3.pointer(touch, svg.node());
        startDrag(pt[0]);
    }, { passive: false });

    svg.node().addEventListener("touchmove", function(e) {
        if (!dragMode) return;
        e.preventDefault();
        const touch = e.touches[0];
        const currX = d3.pointer(touch, svg.node())[0];
        const deltaVal = (currX - startX) * ((max - min) / (width-40));
        if(dragMode === 'move') {
            let dl = startL + deltaVal, dr = startR + deltaVal;
            if(dl < min) { dl=min; dr=min+(startR-startL); } if(dr > max) { dr=max; dl=max-(startR-startL); }
            l = Math.round(dl/snap)*snap; r = Math.round(dr/snap)*snap;
        } else if(dragMode === 'left') {
            let newL = Math.round((startL+deltaVal)/snap)*snap; newL = Math.max(min, Math.min(r, newL));
            if (maxSpan > 0 && (r - newL) > maxSpan) newL = r - maxSpan; l = newL;
        } else if(dragMode === 'right') {
            let newR = Math.round((startR+deltaVal)/snap)*snap; newR = Math.min(max, Math.max(l, newR));
            if (maxSpan > 0 && (newR - l) > maxSpan) newR = l + maxSpan; r = newR;
        }
        const currentPpn = update();
        const checkVal = dragMode === 'right' ? r : l;
        if(Math.abs(checkVal - lastSoundVal) >= snap) { AudioEngine.playClick(currentPpn); lastSoundVal = checkVal; }
    }, { passive: false });

    svg.node().addEventListener("touchend", function(e) {
        dragMode = null;
    });

    function onDrag(e) {
        const currX = d3.pointer(e, svg.node())[0]; const deltaVal = (currX - startX) * ((max - min) / (width-40));
        if(dragMode === 'move') {
            let dl = startL + deltaVal, dr = startR + deltaVal;
            if(dl < min) { dl=min; dr=min+(startR-startL); } if(dr > max) { dr=max; dl=max-(startR-startL); }
            l = Math.round(dl/snap)*snap; r = Math.round(dr/snap)*snap;
        } else if(dragMode === 'left') {
            let newL = Math.round((startL+deltaVal)/snap)*snap; newL = Math.max(min, Math.min(r, newL));
            if (maxSpan > 0 && (r - newL) > maxSpan) newL = r - maxSpan; l = newL;
        } else if(dragMode === 'right') {
            let newR = Math.round((startR+deltaVal)/snap)*snap; newR = Math.min(max, Math.max(l, newR));
            if (maxSpan > 0 && (newR - l) > maxSpan) newR = l + maxSpan; r = newR;
        }
        const currentPpn = update();
        const checkVal = dragMode === 'right' ? r : l;
        if(Math.abs(checkVal - lastSoundVal) >= snap) { AudioEngine.playClick(currentPpn); lastSoundVal = checkVal; }
    }
    function stopDrag() { d3.select(window).on("mousemove", null).on("mouseup", null); }

    Game.submitPinch = function() {
        const ppn = update();
        const win = (r >= Math.floor(trueVal) && l <= Math.ceil(trueVal));
        showResult(win ? ppn : 0, q.answer_text, q);
    };
}

// --- RENDERER: MAP ---
function renderMap(q, container) {
    container.innerHTML = `
        <div class="screen-container">
            <div class="left-panel">
                <h2>${q.question_text}</h2>
                <div class="hint">Select up to ${q.max_selectable} regions.</div>
            </div>
            <div class="right-panel">
                <div id="mapBox">Loading Map...</div>
                <div class="ppn-row"><div class="ppn-label">Potential Points:</div><div class="ppn-display" id="mapPpn">0</div></div>
                <button onclick="Game.submitMap()">SUBMIT ANSWER</button>
            </div>
        </div>
    `;
    const selectedIDs = new Set(); 
    const limit = +q.max_selectable || 99;
    Game.correctRegionIDs = []; 
    
    // --- CUSTOM IMAGE LOGIC ---
    if (q.geo_source === 'custom_image') {
        const width = 600, height = 400;
        const svg = d3.select("#mapBox").html("").append("svg")
            .attr("width", "100%").attr("height", "100%")
            .attr("viewBox", `0 0 ${width} ${height}`); 

        d3.xml(q.svg_file).then(xml => {
            const importedNode = document.importNode(xml.documentElement, true);
            const vBox = d3.select(importedNode).attr("viewBox") || `0 0 ${width} ${height}`;
            svg.attr("viewBox", vBox);

            svg.append("image")
                .attr("href", q.image_file)
                .attr("width", "100%").attr("height", "100%");

            const mapLayer = svg.append("g").attr("class", "map-layer");
            Array.from(importedNode.children).forEach(child => {
                mapLayer.node().appendChild(child);
            });

            // RESET LOOKUP TABLE FOR THIS QUESTION
            Game.mapRegionStatus = {};

            // SETUP INTERACTION & ANSWER KEY
            mapLayer.selectAll("path, rect, circle, polygon, ellipse")
                .attr("fill-opacity", "0.01")
                .attr("stroke", "black") 
                .attr("stroke-width", "4px") 
                .each(function(d, i) { 
                    const el = d3.select(this);
                    // Generate ID
                    const uid = "region_" + i;
                    el.attr("data-internal-id", uid);
                    
                    // ANSWER KEY: Check Color ONCE at load
                    // NOTE: Must use getAttribute directly — getComputedStyle is overridden
                    // by the global CSS fill rule and cannot be trusted here.
                    let val = (this.getAttribute('fill') || this.style.fill || "").toLowerCase();
                    const correctColor = (q.correct_ids || "").toLowerCase();
                    
                    if (hexColorsClose(val, correctColor, 5)) {
                        Game.correctRegionIDs.push(uid);
                    }
                })
                .on("click", function(e) {
                    const el = d3.select(this);
                    const uid = el.attr("data-internal-id"); 
                    
                    if(selectedIDs.has(uid)) { 
                        selectedIDs.delete(uid); 
                        el.classed("selected", false); 
                        el.style("fill", null).style("fill-opacity", "0.01");
                        AudioEngine.playMapClick(selectedIDs.size, false);
                    } else { 
                        const realLimit = (limit === 1 && q.geo_source === 'custom_image') ? 9 : limit;
                        if(selectedIDs.size >= realLimit) return; 
                        
                        selectedIDs.add(uid); 
                        el.classed("selected", true);
                        el.style("fill", "#ffd700").style("fill-opacity", "0.75");
                        AudioEngine.playMapClick(selectedIDs.size, true);
                    }
                    const pts = 100 - (Math.max(0, selectedIDs.size - 1) * 10);
                    document.getElementById("mapPpn").innerText = selectedIDs.size > 0 ? pts : 0;
                })
                .on("mouseover", function() {
                    if(!d3.select(this).classed("selected")) d3.select(this).style("fill", "rgba(255,255,255,0.2)").style("fill-opacity", "0.3");
                })
                .on("mouseout", function() {
                    if(!d3.select(this).classed("selected")) d3.select(this).style("fill", null).style("fill-opacity", "0.01");
                });
        });
        
        Game.lastMapProj = 'custom'; 
        Game.lastMapFeatures = q.svg_file; 

        Game.submitMap = function() {
            let win = false;
            selectedIDs.forEach(uid => {
                if (Game.correctRegionIDs.includes(uid)) win = true;
            });

            const cost = +q.points_per_extra_unit || 10; 
            let pts = 100 - (Math.max(0, selectedIDs.size - 1) * cost);
            if(selectedIDs.size === 0) pts = 0; 
            if(!win) pts = 0;
            
            let ansText = q.answer_text || `This is ${q.correct_ids}:`;

            showResult(pts, ansText, q);
        };
        return;
    } 
    // -------------------------

    let url, projectionType;
    if (q.geo_source === 'us_states') { url = "https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"; projectionType = 'albers'; }
    else if (q.geo_source === 'world_countries') { url = "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json"; projectionType = 'natural'; }
    else if (q.geo_source === 'nyc_boroughs') { url = "https://raw.githubusercontent.com/dwillis/nyc-maps/master/boroughs.geojson"; projectionType = 'mercator'; }
    // Allow spreadsheet projection column to override the default
    if (q.projection) {
        const p = q.projection.trim().toLowerCase();
        if (p === 'mercator') projectionType = 'mercator';
        else if (p === 'albersusa' || p === 'albers') projectionType = 'albers';
        else if (p === 'naturalearth' || p === 'natural') projectionType = 'natural';
    }
    // Force mercator for regional world subsets — naturalEarth wastes space on small clusters
    if (q.geo_source === 'world_countries' && q.visible_ids) { projectionType = 'mercator'; }
    log(`MAP proj: ${projectionType} (geo=${q.geo_source}, spreadsheet=${q.projection||'none'}, hasFilter=${!!q.visible_ids})`);

    Game.lastMapProj = projectionType;
    d3.json(url).then(data => {
        let features;
        if(q.geo_source === 'nyc_boroughs') { features = data.features; features.forEach(f => { let name = f.properties.BoroName || f.properties.name; if(name === "Bronx") name = "The Bronx"; f.properties.name = name; }); }
        else { const key = Object.keys(data.objects).find(k => k.match(/state|countr/)) || Object.keys(data.objects)[0]; features = topojson.feature(data, data.objects[key]).features; }
        if(q.visible_ids) { const whitelist = q.visible_ids.split(",").map(s => s.trim()); const before = features.length; features = features.filter(f => whitelist.includes(f.properties.name)); log(`MAP filter: ${features.length}/${whitelist.length} matched (from ${before} total features). Names: ${features.map(f=>f.properties.name).join(', ')}`); const missed = whitelist.filter(n => !features.find(f => f.properties.name === n)); if(missed.length) log(`MAP MISSING: ${missed.join(', ')}`); }
        // Strip overseas territory polygons that blow up the bounding box for regional maps
        if(q.visible_ids && q.geo_source === 'world_countries' && features.length > 1) {
            const centroids = features.map(f => d3.geoCentroid(f));
            const medLon = centroids.map(c=>c[0]).sort((a,b)=>a-b)[Math.floor(centroids.length/2)];
            const medLat = centroids.map(c=>c[1]).sort((a,b)=>a-b)[Math.floor(centroids.length/2)];
            const threshold = 30; // degrees from median — generous for a regional cluster
            features = features.map(f => {
                if(f.geometry.type !== 'MultiPolygon') return f;
                const kept = f.geometry.coordinates.filter(poly => {
                    const temp = {type:'Polygon', coordinates: poly};
                    const c = d3.geoCentroid(temp);
                    return Math.abs(c[0]-medLon) < threshold && Math.abs(c[1]-medLat) < threshold;
                });
                if(kept.length === 0) return f; // safety: don't delete a country entirely
                const clipped = Object.assign({}, f, {geometry: {type: kept.length === 1 ? 'Polygon' : 'MultiPolygon', coordinates: kept.length === 1 ? kept[0] : kept}});
                clipped.properties = f.properties;
                return clipped;
            });
            log(`MAP clipped overseas territories (median center: ${medLon.toFixed(1)}, ${medLat.toFixed(1)})`);
        }
        Game.lastMapFeatures = features; 
        const width = 600, height = 400;
        const svg = d3.select("#mapBox").html("").append("svg").attr("viewBox", `0 0 ${width} ${height}`).style("width", "100%").style("height", "100%");
        let proj;
        if(Game.lastMapProj === 'albers') proj = d3.geoAlbersUsa().fitSize([width, height], {type:"FeatureCollection", features});
        else if(Game.lastMapProj === 'natural') proj = d3.geoNaturalEarth1().fitSize([width, height], {type:"FeatureCollection", features});
        else proj = d3.geoMercator().fitSize([width, height], {type:"FeatureCollection", features});
        const path = d3.geoPath().projection(proj);
        svg.selectAll("path").data(features).join("path").attr("d", path)
            .on("click", function(e, d) {
                const name = d.properties.name; const el = d3.select(this); 
                if(selectedIDs.has(name)) { selectedIDs.delete(name); el.classed("selected", false); AudioEngine.playMapClick(selectedIDs.size, false); } 
                else { if(selectedIDs.size >= limit) return; selectedIDs.add(name); el.classed("selected", true); AudioEngine.playMapClick(selectedIDs.size, true); }
                const cost = +q.points_per_extra_unit || 10;
                let pts = 100 - (Math.max(0, selectedIDs.size - 1) * cost); if(selectedIDs.size === 0) pts = 0;
                document.getElementById("mapPpn").innerText = pts;
            });
    });
    Game.submitMap = function() {
        const correct = q.correct_ids; const win = selectedIDs.has(correct);
        const cost = +q.points_per_extra_unit || 10; let pts = 100 - (Math.max(0, selectedIDs.size - 1) * cost);
        if(selectedIDs.size === 0) pts = 0; if(!win) pts = 0;
        showResult(pts, q.answer_text || `This is ${correct}:`, q);
    };
}

// --- RENDERER: DRAW ---
function renderDraw(q, container) {
    container.innerHTML = `
        <div class="screen-container">
            <div class="left-panel">
                <h2>${q.question_text || "Question"}</h2>
                <div class="hint">Draw a circle or shape that includes the correct answer.</div>
            </div>
            <div class="right-panel">
                <div id="drawContainer">
                    <img id="drawImg" src="${q.image_file}" alt="Question Image">
                    <canvas id="drawCanvas"></canvas>
                </div>
                <div class="ppn-row"><div class="ppn-label">Potential Points:</div><div class="ppn-display" id="drawPpn">100</div></div>
                <div class="draw-buttons">
                    <button class="erase-btn" onclick="Game.eraseDraw()">ERASE</button>
                    <button id="drawSubmitBtn" onclick="Game.submitDraw()" disabled>SUBMIT ANSWER</button>
                </div>
            </div>
        </div>
    `;

    // Wait for image to load to set canvas size
    const img = document.getElementById("drawImg");
    const canvasEl = document.getElementById("drawCanvas");
    const ctx = canvasEl.getContext("2d");
    let points = [];
    let isDrawing = false;
    let shapeComplete = false;
    let totalLineLength = 0;

    function initCanvas() {
        const rect = canvasEl.parentElement.getBoundingClientRect();
        canvasEl.width = rect.width;
        canvasEl.height = rect.height;
        if (typeof drawMask === 'function') drawMask(); // re-draw mask at correct size
    }

    img.onload = initCanvas;
    // In case already cached
    if (img.complete) setTimeout(initCanvas, 50);

    function getPos(e) {
        const rect = canvasEl.getBoundingClientRect();
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    function drawShape() {
        ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
        if (points.length < 2) return;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        if (shapeComplete) ctx.closePath();

        ctx.fillStyle = "rgba(255,215,0,0.25)";
        ctx.strokeStyle = "#ffd700";
        ctx.lineWidth = 4;
        if (shapeComplete) ctx.fill();
        ctx.stroke();
    }

    // Max line length = canvas perimeter (PPN reaches 0 here at rate 1.0)
    const linePpnRate = +q.line_ppn_rate || 1;
    function getMaxLength() { return 2 * (canvasEl.width + canvasEl.height); }

    function calcPPN() {
        const maxLen = getMaxLength();
        if (maxLen === 0) return 100;
        return Math.max(0, Math.round(100 * (1 - (totalLineLength * linePpnRate) / maxLen)));
    }

    function updatePPN() {
        if (!shapeComplete || points.length < 3) {
            document.getElementById("drawPpn").innerText = "100";
            document.getElementById("drawSubmitBtn").disabled = true;
            return;
        }

        document.getElementById("drawPpn").innerText = calcPPN();
        document.getElementById("drawSubmitBtn").disabled = false;
    }

    canvasEl.addEventListener("mousedown", function(e) {
        if (shapeComplete) return; // Must erase first
        isDrawing = true;
        drawSoundDist = 0;
        totalLineLength = 0;
        points = [getPos(e)];
        drawShape();
    });

    let drawSoundDist = 0;
    const drawSoundInterval = 25; // pixels of travel between tones

    canvasEl.addEventListener("mousemove", function(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        // Accumulate distance
        const prev = points[points.length - 1];
        const segLen = Math.hypot(pos.x - prev.x, pos.y - prev.y);
        totalLineLength += segLen;
        drawSoundDist += segLen;

        points.push(pos);
        drawShape();
        // Live PPN feedback while drawing
        if (points.length >= 3) {
            const ppn = calcPPN();
            document.getElementById("drawPpn").innerText = ppn;
            // Play soft tone at distance intervals, pitch descends with PPN
            if (drawSoundDist >= drawSoundInterval) {
                drawSoundDist = 0;
                AudioEngine.playDrawTone(ppn);
            }
        }
    });

    canvasEl.addEventListener("mouseup", function(e) {
        if (!isDrawing) return;
        isDrawing = false;
        if (points.length >= 3) {
            shapeComplete = true;
            drawShape();
            updatePPN();
            AudioEngine.playClick(50);
        }
    });

    // TOUCH SUPPORT FOR DRAW CANVAS
    function getTouchPos(e) {
        const touch = e.touches[0];
        const rect = canvasEl.getBoundingClientRect();
        return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    canvasEl.addEventListener("touchstart", function(e) {
        if (shapeComplete) return;
        e.preventDefault();
        isDrawing = true;
        drawSoundDist = 0;
        totalLineLength = 0;
        points = [getTouchPos(e)];
        drawShape();
    }, { passive: false });

    canvasEl.addEventListener("touchmove", function(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getTouchPos(e);
        const prev = points[points.length - 1];
        const segLen = Math.hypot(pos.x - prev.x, pos.y - prev.y);
        totalLineLength += segLen;
        drawSoundDist += segLen;

        points.push(pos);
        drawShape();
        if (points.length >= 3) {
            const ppn = calcPPN();
            document.getElementById("drawPpn").innerText = ppn;
            if (drawSoundDist >= drawSoundInterval) {
                drawSoundDist = 0;
                AudioEngine.playDrawTone(ppn);
            }
        }
    }, { passive: false });

    canvasEl.addEventListener("touchend", function(e) {
        if (!isDrawing) return;
        isDrawing = false;
        if (points.length >= 3) {
            shapeComplete = true;
            drawShape();
            updatePPN();
            AudioEngine.playClick(50);
        }
    });

    // Load answer mask into hidden canvas for hit detection
    const maskCanvas = document.createElement("canvas");
    const maskCtx = maskCanvas.getContext("2d");
    const maskImg = new Image();
    maskImg.crossOrigin = "anonymous";
    maskImg.src = q.answer_mask_file;
    let maskReady = false;
    let maskImgLoaded = false;

    // Draw mask with object-fit:contain layout matching the visible image.
    // Must be called AFTER initCanvas has set canvasEl dimensions.
    function drawMask() {
        if (!maskImgLoaded || canvasEl.width < 2) return; // not ready yet
        maskCanvas.width = canvasEl.width;
        maskCanvas.height = canvasEl.height;
        const cW = maskCanvas.width, cH = maskCanvas.height;
        const iW = maskImg.naturalWidth, iH = maskImg.naturalHeight;
        const scale = Math.min(cW / iW, cH / iH);
        const dW = iW * scale, dH = iH * scale;
        const dx = (cW - dW) / 2, dy = (cH - dH) / 2;
        maskCtx.drawImage(maskImg, dx, dy, dW, dH);
        maskReady = true;
        log("Draw mask ready (contain-fit, " + cW + "x" + cH + ")");
    }

    maskImg.onload = function() {
        maskImgLoaded = true;
        drawMask(); // draws now if canvas is sized, otherwise initCanvas will call it
    };

    // Check if drawn shape overlaps any correct-color pixels in mask.
    // Uses pixel overlap: rasterizes the polygon (fill + thick stroke)
    // onto a temp canvas, then checks for any pixel that is BOTH part
    // of the drawn shape AND a correct-color mask pixel. This catches
    // enclosing, partial overlap, and even just the line crossing through.
    function checkHit() {
        if (!maskReady || points.length < 3) return false;

        const correctHex = (q.correct_color || "").replace('#', '').toLowerCase();
        if (correctHex.length !== 6) return false;
        const cr = parseInt(correctHex.slice(0,2), 16);
        const cg = parseInt(correctHex.slice(2,4), 16);
        const cb = parseInt(correctHex.slice(4,6), 16);

        // Rasterize the player's polygon onto a temp canvas
        const polyCanvas = document.createElement("canvas");
        polyCanvas.width = maskCanvas.width;
        polyCanvas.height = maskCanvas.height;
        const polyCtx = polyCanvas.getContext("2d");

        polyCtx.beginPath();
        polyCtx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) polyCtx.lineTo(points[i].x, points[i].y);
        polyCtx.closePath();
        polyCtx.fillStyle = "white";
        polyCtx.fill();
        polyCtx.strokeStyle = "white";
        polyCtx.lineWidth = 6; // thick stroke so the drawn line itself counts
        polyCtx.stroke();

        const polyData = polyCtx.getImageData(0, 0, polyCanvas.width, polyCanvas.height).data;
        const maskData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;

        // Scan for any pixel that is both inside the polygon AND correct-color in mask
        const step = 2;
        for (let y = 0; y < maskCanvas.height; y += step) {
            for (let x = 0; x < maskCanvas.width; x += step) {
                const idx = (y * maskCanvas.width + x) * 4;
                // Is this pixel part of the drawn shape? (alpha > 0)
                if (polyData[idx + 3] < 128) continue;
                // Is this pixel the correct color in the mask?
                const r = maskData[idx], g = maskData[idx+1], b = maskData[idx+2];
                if (Math.abs(r - cr) < 30 && Math.abs(g - cg) < 30 && Math.abs(b - cb) < 30) {
                    return true;
                }
            }
        }
        return false;
    }

    // Erase
    Game.eraseDraw = function() {
        points = [];
        isDrawing = false;
        shapeComplete = false;
        totalLineLength = 0;
        ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
        document.getElementById("drawPpn").innerText = "100";
        document.getElementById("drawSubmitBtn").disabled = true;
    };

    // Submit
    Game.submitDraw = function() {
        const ppn = calcPPN();
        const win = checkHit();
        showResult(win ? ppn : 0, q.answer_text || "Here is the correct answer:", q);
    };
}

function showResult(pts, ansText, q, isBonus, customHeader) {
    // SOUND: 1P gets win/loss feedback; 2P stays neutral (no spoilers)
    if (Game.mode === 1) {
        if (isBonus && pts > 0) AudioEngine.playBonusWin();
        else if(pts > 0) AudioEngine.playWin();
        else AudioEngine.playLoss();
    } else {
        if(Game.player === 0) AudioEngine.playTurnBellLow();
        else AudioEngine.playNeutralBell();
    }
    if(Game.mode === 1) Game.scores[0] += pts;
    else {
        if(Game.player === 0) { Game.tempScore = pts; Game.player = 1; showReadyScreen(); return; } 
        else { Game.scores[0] += Game.tempScore; Game.scores[1] += pts; Game.player = 0; Game.index++; }
    }
    if(Game.mode === 1) Game.index++;

    // HEADER LOGIC
    let header = "";
    let pointsHTML = "";
    if (customHeader) {
        header = customHeader;
        pointsHTML = `<h2>+${pts} Points</h2>`;
    } else if (Game.mode === 2) {
        header = "RESULTS";
        pointsHTML = `<h2 style="display:flex; justify-content:center; gap:60px; flex-wrap:wrap;">
            <span>PLAYER 1 <span style="color:var(--gold);">+${Game.tempScore}</span></span>
            <span>PLAYER 2 <span style="color:var(--gold);">+${pts}</span></span>
        </h2>`;
    } else {
        header = pts > 0 ? `CORRECT! YOU GOT...` : `SORRY, YOU GOT...`;
        pointsHTML = `<h2>+${pts} Points</h2>`;
    }
    
    let scoreHTML = '';
    if (Game.mode === 1) { scoreHTML = `<div class="score-box-1p"><div class="score-label">YOUR TOTAL SCORE:</div><div class="score-val">${Game.scores[0]}</div></div>`; } 
    else { scoreHTML = `<div style="display:flex; gap:20px; width:100%;"><div class="score-box"><div class="score-label">PLAYER 1'S SCORE:</div><div class="score-val">${Game.scores[0]}</div></div><div class="score-box"><div class="score-label">PLAYER 2'S SCORE:</div><div class="score-val">${Game.scores[1]}</div></div></div>`; }

    let contentHTML = "";
    if (isBonus) {
        contentHTML = ansText; 
        ansText = ""; 
    } else if (q && q.type === 'map') {
        contentHTML = `<div class="map-reveal-label">${ansText}</div><div id="resultMapBox"></div>`;
        ansText = ""; 
    } else if (q && q.type === 'draw' && q.answer_screen) {
        const ansImgPath = q.answer_screen;
        contentHTML = `<div class="map-reveal-label">${ansText}</div><div style="margin:10px auto; text-align:center;"><img src="${ansImgPath}" style="max-width:400px; max-height:300px; border-radius:8px; border:1px solid rgba(255,255,255,0.2);"></div>`;
        ansText = "";
    }

    document.getElementById("app").innerHTML = `
        <h1>${header}</h1>
        ${pointsHTML}
        ${contentHTML}
        <div class="answer-text">${ansText}</div>
        <div style="width:90%; margin:20px auto;">${scoreHTML}</div>
        <button onclick="nextTurn()">CONTINUE</button>
    `;

    if (q && q.type === 'map') {
        const width = 600, height = 400;
        const svg = d3.select("#resultMapBox").append("svg").attr("viewBox", `0 0 ${width} ${height}`).style("width", "100%").style("height", "100%");
        
        // Custom Image Result
        if (q.geo_source === 'custom_image') {
             d3.xml(q.svg_file).then(xml => {
                const importedNode = document.importNode(xml.documentElement, true);
                const vBox = d3.select(importedNode).attr("viewBox") || `0 0 ${width} ${height}`;
                svg.attr("viewBox", vBox);
                
                svg.append("image")
                    .attr("href", q.image_file)
                    .attr("width", "100%").attr("height", "100%");
                
                const mapLayer = svg.append("g");
                Array.from(importedNode.children).forEach(child => mapLayer.node().appendChild(child));
                
                const correctColor = (q.correct_ids || "").toLowerCase();
                
                mapLayer.selectAll("path, rect, circle, polygon, ellipse")
                    .each(function() {
                        // Read original fill BEFORE overwriting — getComputedStyle
                        // is poisoned by CSS; use getAttribute directly.
                        const val = (this.getAttribute("fill") || this.style.fill || "").toLowerCase();
                        
                        d3.select(this).attr("fill", "transparent").attr("stroke", "white").attr("stroke-width", "4px");
                        
                        if (hexColorsClose(val, correctColor, 5)) {
                            d3.select(this).style("fill", "#ffd700").style("fill-opacity", "0.75").attr("stroke", "black").attr("stroke-width", "4px");
                        }
                    });
             });
        } else {
            // Standard GeoJSON Result
            const features = Game.lastMapFeatures;
            let proj;
            if(Game.lastMapProj === 'albers') proj = d3.geoAlbersUsa().fitSize([width, height], {type:"FeatureCollection", features});
            else if(Game.lastMapProj === 'natural') proj = d3.geoNaturalEarth1().fitSize([width, height], {type:"FeatureCollection", features});
            else proj = d3.geoMercator().fitSize([width, height], {type:"FeatureCollection", features});
            const path = d3.geoPath().projection(proj);
            svg.selectAll("path").data(features).join("path").attr("d", path).attr("class", d => d.properties.name === q.correct_ids ? "correct-highlight" : "");
        }
    }
}

function showGameOver() {
    let msg = "";
    if(Game.mode === 2) {
        const p1 = Game.scores[0], p2 = Game.scores[1];
        if(p1 > p2) msg = "PLAYER 1 WINS!"; else if(p2 > p1) msg = "PLAYER 2 WINS!"; else msg = "IT'S A TIE!";
        msg += `<br><span style="font-size:24px; opacity:0.8">P1: ${p1} - P2: ${p2}</span>`;
    } else { msg = `<div class="score-box-1p"><div class="score-label">YOUR FINAL SCORE:</div><div class="score-val">${Game.scores[0]}</div></div>`; }
    document.getElementById("app").innerHTML = `<h1>GAME OVER</h1>${Game.mode === 2 ? '<div class="ppn-display">' + msg + '</div>' : msg}<button onclick="location.reload()">PLAY AGAIN</button>`;
}
