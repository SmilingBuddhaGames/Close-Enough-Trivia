<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLOSE ENOUGH TRIVIA - BUILD v36 (STABLE)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<style>
/* --- THEME: NEON NOIR --- */
:root { --gold: #ffd700; --gold-dark: #9a6800; --bg-gradient: linear-gradient(150deg, #5a0a9e 0%, #1a0035 60%, #0d001f 100%); }

* { box-sizing: border-box; user-select: none; }
body { margin: 0; font-family: 'Barlow', sans-serif; background: var(--bg-gradient); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

#app { width: 95%; max-width: 1200px; padding: 20px; text-align: center; position: relative; }

/* TYPOGRAPHY */
h1 { font-family: 'Oswald', sans-serif; font-size: 54px; color: var(--gold); text-transform: uppercase; margin: 0 0 4px 0; text-shadow: 0 0 30px rgba(255,215,0,0.4); line-height: 1.05; letter-spacing: 2px; }

.nerd-label { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,215,0,0.6); margin-bottom: 14px; }
.proto-label { font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 4px; color: rgba(255,255,255,0.35); margin-top: 8px; margin-bottom: 30px; }

.center-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 65vh; gap: 24px; }

h2 { font-family: 'Oswald', sans-serif; font-size: 48px; line-height: 1.4; margin: 0 0 20px 0; font-weight: 600; letter-spacing: 1px; }

.answer-text { font-family: 'Barlow', sans-serif; font-size: 40px; font-weight: 500; line-height: 1.3; margin: 20px 0; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

.hint { font-style: italic; opacity: 0.8; font-size: 24px; margin-bottom: 20px; min-height: 24px; line-height: 1.4; }
.ppn-display { font-family: 'Oswald', sans-serif; font-size: 48px; color: var(--gold); }
.ppn-label { font-family: 'Oswald', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
.ppn-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
.selection-display { font-family: 'Oswald', sans-serif; font-size: 28px; color: white; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

/* CONTROLS */
button {
    padding: 15px 30px; font-family: 'Oswald', sans-serif; font-size: 20px; text-transform: uppercase;
    border: none; border-radius: 8px; background: linear-gradient(to bottom, #ffd700, #e09800); color: #160030;
    cursor: pointer; margin: 10px; box-shadow: 0 5px 0 var(--gold-dark); transition: transform 0.1s;
}
button:active { transform: translateY(4px); box-shadow: none; }
button:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

/* LAYOUTS */
.screen-container { display: flex; flex-wrap: wrap; background: rgba(0,0,0,0.25); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; min-height: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.left-panel { flex: 1.2; padding: 40px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid rgba(255,255,255,0.1); min-width: 400px; text-align: left; }
.right-panel { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-width: 350px; background: rgba(0,0,0,0.1); }

/* MODULES */
#mapBox, #resultMapBox { width: 100%; height: 400px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
#resultMapBox { height: 300px; width: 80%; margin: 10px auto; } 
#rulerContainer { width: 100%; height: 180px; margin-bottom: 20px; background: rgba(0,0,0,0.2); border-radius: 8px; position: relative; touch-action: none; }

/* MAP STYLES */
path, rect, circle, polygon, ellipse { transition: fill 0.2s, stroke 0.2s; cursor: pointer; stroke: white; stroke-width: 0.5px; fill: rgba(255,255,255,0.05); }
path:hover, rect:hover, circle:hover, polygon:hover, ellipse:hover { fill: rgba(255,255,255,0.2) !important; }
path.selected, rect.selected, circle.selected, polygon.selected, ellipse.selected { fill: #ffd700 !important; stroke: #fff; stroke-width: 1px; }
path.correct-highlight, rect.correct-highlight, circle.correct-highlight, polygon.correct-highlight, ellipse.correct-highlight { fill: #ffd700 !important; stroke: #fff; stroke-width: 3px; }

/* PINCH BAR STYLE */
rect.pinch-bar { fill: rgba(255,215,0,0.3) !important; stroke: #ffd700 !important; stroke-width: 3px !important; }
rect.pinch-bar:hover { fill: rgba(255,215,0,0.3) !important; }
@keyframes edgePulse { 0%, 100% { opacity: 0.3; filter: drop-shadow(0 0 4px #ffd700); } 50% { opacity: 1; filter: drop-shadow(0 0 14px #ffd700); } }

/* BONUS GRID */
.bonus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; text-align: left; margin-bottom: 20px; }
.bonus-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 6px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; font-size: 18px; }
.bonus-item:hover { background: rgba(255,255,255,0.2); }
.bonus-item.active { background: #ffd700; color: black; font-weight: bold; }

/* RESULTS */
.score-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin: 5px; flex: 1; border: 1px solid rgba(255,215,0,0.3); }
.score-box-1p { background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 8px; margin: 5px auto; border: 1px solid rgba(255,215,0,0.3); display: flex; align-items: center; justify-content: center; gap: 16px; width: fit-content; }
.score-box-1p .score-label { margin-bottom: 0; }
.score-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; margin-bottom: 5px; }
.score-val { font-family: 'Oswald'; font-size: 60px; color: var(--gold); }
.map-reveal-label { font-family: 'Oswald'; font-size: 24px; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; }

/* BONUS RESULTS SPLIT */
.bonus-result-container { display: flex; width: 100%; gap: 20px; margin-top: 20px; text-align: left; }
.bonus-col { flex: 1; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
.bonus-col h3 { font-family: 'Oswald'; color: var(--gold); margin: 0 0 10px 0; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
.bonus-list-item { font-size: 16px; margin-bottom: 6px; opacity: 0.8; }

/* DEBUG OVERLAY */
.debug-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; padding: 40px; overflow-y: auto; }
.debug-overlay.active { display: block; }
.debug-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
.debug-item { background: #333; padding: 15px; border-radius: 5px; cursor: pointer; text-align: left; border: 1px solid #555; transition: all 0.2s; }
.debug-item:hover { background: #555; border-color: var(--gold); }
.debug-id { color: var(--gold); font-family: 'Oswald'; font-size: 18px; margin-bottom: 5px; }
.debug-type { font-size: 12px; opacity: 0.7; text-transform: uppercase; }
.debug-close { position: fixed; top: 20px; right: 20px; z-index: 10000; background: #555; }
.debug-btn { background: #333; color: #aaa; font-size: 14px; padding: 10px 20px; margin-top: 30px; border: 1px solid #555; box-shadow: none; }
.debug-btn:hover { background: #444; color: white; }

/* BONUS RESULT ANIMATION */
@keyframes flyFromBottom { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes flyFromRight { from { transform: translateX(300px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes flashOnOff { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

.bonus-anim-section { width: 95%; max-width: 750px; margin: 0 auto; text-align: left; }
.bonus-anim-header { font-family: 'Oswald', sans-serif; font-size: 28px; color: white; text-transform: uppercase; letter-spacing: 2px; margin: 12px 0 6px 0; opacity: 0; animation: fadeIn 0.3s forwards; }
.bonus-anim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }
.bonus-anim-item { display: flex; align-items: center; gap: 10px; padding: 5px 12px; border-radius: 6px; font-family: 'Barlow', sans-serif; font-size: 16px; opacity: 0; white-space: nowrap; overflow: hidden; }
.bonus-anim-item.fly-bottom { animation: flyFromBottom 0.3s forwards; }
.bonus-anim-item.fly-right { animation: flyFromRight 0.3s forwards; }
.bonus-anim-item .bonus-mark { font-size: 26px; line-height: 1; flex-shrink: 0; }
.bonus-anim-item .bonus-mark-x { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; line-height: 1; flex-shrink: 0; }
.bonus-finale { opacity: 0; animation: fadeIn 0.4s forwards; }

/* BONUS 2P GRID */
.bonus-grid-table { margin: 10px auto; border-collapse: separate; border-spacing: 0 3px; }
.bonus-grid-table th { font-family: 'Oswald', sans-serif; font-size: 16px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; text-align: center; }
.bonus-grid-table th.col-answer { text-align: left; }
.bonus-grid-table td { padding: 4px 8px; vertical-align: middle; }
.bonus-grid-row { opacity: 0; }
.bonus-grid-row.fly-bottom { animation: flyFromBottom 0.25s forwards; }
.bonus-grid-row td.cell-mark { width: 28px; text-align: center; font-size: 20px; }
.bonus-grid-row td.cell-answer { font-family: 'Barlow', sans-serif; font-size: 15px; text-align: left; white-space: nowrap; padding-right: 16px; }
.bonus-grid-row td.cell-player { width: 36px; text-align: center; }
.bonus-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; }
.bonus-dot-correct { background: var(--gold); box-shadow: 0 0 6px rgba(255,215,0,0.5); }
.bonus-dot-wrong { background: rgba(180,180,180,0.6); }

/* LOADING LOG */
#bootLog { font-family: monospace; color: #00ff00; background: rgba(0,0,0,0.95); padding: 6px; text-align: left; position: fixed; bottom: 40px; right: 10px; border-radius: 5px; font-size: 7px; pointer-events: none; max-height: 80px; overflow: hidden; z-index: 99999; border: 1px solid #333; display: none; }
#bootLog.visible { display: block; }
#logToggle { position: fixed; bottom: 12px; right: 12px; width: 36px; height: 12px; border-radius: 6px; background: linear-gradient(to bottom, #ffd700, #e09800); border: none; cursor: pointer; z-index: 100000; opacity: 0.6; transition: opacity 0.2s; padding: 0; box-shadow: none; margin: 0; }
#logToggle:hover { opacity: 1; }
#logToggle:active { transform: none; }

/* DRAW QUESTION */
#drawContainer { position: relative; width: 100%; height: 400px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; cursor: crosshair; margin-bottom: 15px; touch-action: none; }
#drawContainer img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
#drawCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
.draw-warning { font-family: 'Oswald', sans-serif; font-size: 22px; color: #ff3333; text-transform: uppercase; min-height: 28px; margin-bottom: 5px; }
.draw-buttons { display: flex; gap: 10px; justify-content: center; }
.draw-buttons button.erase-btn { background: linear-gradient(to bottom, #888, #555); color: white; box-shadow: 0 5px 0 #333; }
.err-msg { color: #ff5555; font-weight: bold; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 3px; display:inline-block; }

/* --- MOBILE RESPONSIVE --- */
@media (max-width: 600px) {
    body { align-items: flex-start; }
    #app { width: 100%; padding: 10px; }

    /* Typography scale-down */
    h1 { font-size: 32px; letter-spacing: 1px; }
    h2 { font-size: 28px; line-height: 1.3; margin-bottom: 10px; }
    .hint { font-size: 16px; margin-bottom: 10px; min-height: 16px; }
    .answer-text { font-size: 24px; margin: 10px 0; }
    .ppn-display { font-size: 32px; }
    .ppn-label { font-size: 11px; letter-spacing: 1px; }
    .selection-display { font-size: 20px; }

    /* Panels stack vertically */
    .screen-container { min-height: auto; flex-direction: column; }
    .left-panel { min-width: 0; padding: 20px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .right-panel { min-width: 0; padding: 20px; }

    /* Center screen layout */
    .center-screen { min-height: 50vh; gap: 16px; }

    /* Buttons */
    button { padding: 12px 20px; font-size: 16px; margin: 6px; }

    /* Map & Draw containers */
    #mapBox { height: 280px; margin-bottom: 10px; }
    #resultMapBox { height: 200px; width: 95%; }
    #drawContainer { height: 280px; }
    #rulerContainer { height: 140px; }

    /* Bonus grid */
    .bonus-grid { grid-template-columns: 1fr; gap: 6px; }
    .bonus-item { font-size: 15px; padding: 10px; }

    /* Bonus result animations */
    .bonus-anim-section { max-width: 100%; }
    .bonus-anim-grid { grid-template-columns: 1fr; gap: 3px; }
    .bonus-anim-item { font-size: 14px; padding: 4px 8px; white-space: normal !important; overflow: visible !important; }
    .bonus-anim-header { font-size: 22px; margin: 8px 0 4px 0; }

    /* Score boxes */
    .score-box { padding: 10px; }
    .score-val { font-size: 40px; }
    .score-label { font-size: 11px; }
    .score-box-1p { padding: 6px 14px; gap: 10px; }

    /* PPN row */
    .ppn-row { gap: 8px; margin: 6px 0; }

    /* Debug */
    .debug-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .debug-item { padding: 10px; }

    /* Override inline font-sizes on instructions & bonus choice screens */
    .center-screen h2 { font-size: 28px !important; }
    .center-screen > div { max-width: 100%; }
    .center-screen > div > div { font-size: clamp(16px, 5vw, 36px) !important; }
}
</style>
</head>
<body>

<div id="app">
    <div id="screen-loading">
        <h1>System Initializing...</h1>
        <div class="hint">Attempting to connect...</div>
    </div>
</div>

<div id="debugMenu" class="debug-overlay">
    <button class="debug-close" onclick="closeDebug()">CLOSE</button>
    <h1>DEBUG DATABASE</h1>
    <div id="debugList" class="debug-grid"></div>
</div>

<div id="bootLog">Browser Check...</div>
<button id="logToggle" onclick="document.getElementById('bootLog').classList.toggle('visible')"></button>

<script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js" onerror="libError('D3')"></script>
<script src="https://unpkg.com/topojson@3.0.2/dist/topojson.min.js" onerror="libError('TopoJSON')"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" onerror="libError('SheetJS')"></script>

<script>
// --- UTILS ---
function rgbToHex(rgb) {
    if (!rgb || rgb.startsWith('#')) return rgb;
    const sep = rgb.indexOf(",") > -1 ? "," : " ";
    rgb = rgb.substr(4).split(")")[0].split(sep);
    let r = (+rgb[0]).toString(16), g = (+rgb[1]).toString(16), b = (+rgb[2]).toString(16);
    if (r.length == 1) r = "0" + r;
    if (g.length == 1) g = "0" + g;
    if (b.length == 1) b = "0" + b;
    return "#" + r + g + b;
}

// COLOR TOLERANCE: Compares two colors within ±tol per RGB channel.
// Handles both hex (#FF0000) and rgb(255,0,0) formats, plus
// PNG-to-SVG color shifts that can offset channels by a few values.
function hexColorsClose(a, b, tol) {
    if (!a || !b) return false;
    // Normalize rgb() format to hex using existing utility
    a = rgbToHex(a.trim());
    b = rgbToHex(b.trim());
    a = a.replace('#','').toLowerCase();
    b = b.replace('#','').toLowerCase();
    if (a.length !== 6 || b.length !== 6) return a === b;
    const ra = parseInt(a.slice(0,2),16), ga = parseInt(a.slice(2,4),16), ba = parseInt(a.slice(4,6),16);
    const rb = parseInt(b.slice(0,2),16), gb = parseInt(b.slice(2,4),16), bb = parseInt(b.slice(4,6),16);
    return Math.abs(ra-rb) <= tol && Math.abs(ga-gb) <= tol && Math.abs(ba-bb) <= tol;
}

// --- LOGGING ---
function log(msg, type='') {
    const el = document.getElementById("bootLog");
    if(!el) return;
    const color = type === 'err' ? '#ff5555' : '#00ff00';
    el.innerHTML = `<span style="color:${color}">> ${msg}</span><br>` + el.innerHTML;
}

// --- ERROR TRAP ---
function libError(libName) {
    log(`FATAL: Failed to load ${libName}. Check Internet.`, 'err');
    document.getElementById("screen-loading").innerHTML = `
        <h1>CONNECTION ERROR</h1>
        <div class="hint" style="color:#ff5555">Could not load ${libName} library.</div>
        <p>Please check your internet connection and refresh.</p>
    `;
}

// --- AUDIO ENGINE ---
const AudioEngine = {
    ctx: null,
    init: function() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    playTone: function(type, freq, duration, startTime=0) {
        if (!this.ctx) return;
        const t = startTime || this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.25, t);
        osc.start(t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
        osc.stop(t + duration);
    },
    // RANGEFRAME DRAG CLICK — soft sine tone, pitch scales with PPN
    playClick: function(ppn) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = "sine";
        const minFreq = 250, maxFreq = 900;
        osc.frequency.value = minFreq + (ppn / 100) * (maxFreq - minFreq);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        const now = this.ctx.currentTime;
        gain.gain.setValueAtTime(0.001, now);
        gain.gain.linearRampToValueAtTime(0.25, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
    },
    playMapClick: function(count, isAdding) {
        if (!this.ctx) return;
        let freq = Math.max(150, 600 - (count * 30));
        if (!isAdding) freq += 150; 
        this.playTone('sine', freq, 0.1);
    },
    // DRAW DRAG TONE — sine wave, soft, pitch descends as area grows
    playDrawTone: function(ppn) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = "sine";
        const minFreq = 250, maxFreq = 900;
        osc.frequency.value = minFreq + (ppn / 100) * (maxFreq - minFreq);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        const now = this.ctx.currentTime;
        gain.gain.setValueAtTime(0.001, now);
        gain.gain.linearRampToValueAtTime(0.25, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
    },
    // 1P WIN — grace note B3 into 8th-note B4 + D#4 harmony
    playWin: function() { 
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const B3 = 246.94, B4 = 493.88, Ds4 = 311.13;
        const graceDur = 0.069, mainDur = 0.288;

        // Grace note — B3, very short
        const o1 = this.ctx.createOscillator(); const g1 = this.ctx.createGain();
        o1.type = 'triangle'; o1.frequency.value = B3;
        o1.connect(g1); g1.connect(this.ctx.destination);
        g1.gain.setValueAtTime(0.0001, now);
        g1.gain.linearRampToValueAtTime(0.25, now + 0.005);
        g1.gain.exponentialRampToValueAtTime(0.0001, now + graceDur);
        o1.start(now); o1.stop(now + graceDur);

        // Main note — B4, 8th note
        const t2 = now + graceDur;
        const o2 = this.ctx.createOscillator(); const g2 = this.ctx.createGain();
        o2.type = 'triangle'; o2.frequency.value = B4;
        o2.connect(g2); g2.connect(this.ctx.destination);
        g2.gain.setValueAtTime(0.0001, t2);
        g2.gain.linearRampToValueAtTime(0.25, t2 + 0.005);
        g2.gain.exponentialRampToValueAtTime(0.0001, t2 + mainDur);
        o2.start(t2); o2.stop(t2 + mainDur);

        // Harmony — D#4, same timing as B4
        const o3 = this.ctx.createOscillator(); const g3 = this.ctx.createGain();
        o3.type = 'triangle'; o3.frequency.value = Ds4;
        o3.connect(g3); g3.connect(this.ctx.destination);
        g3.gain.setValueAtTime(0.0001, t2);
        g3.gain.linearRampToValueAtTime(0.25, t2 + 0.005);
        g3.gain.exponentialRampToValueAtTime(0.0001, t2 + mainDur);
        o3.start(t2); o3.stop(t2 + mainDur);
    },
    // 1P LOSS — two descending sawtooth notes
    playLoss: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc1 = this.ctx.createOscillator(); const gain1 = this.ctx.createGain();
        osc1.type = 'sawtooth'; osc1.frequency.setValueAtTime(146.8, now); osc1.frequency.linearRampToValueAtTime(155.6, now + 0.1);
        osc1.connect(gain1); gain1.connect(this.ctx.destination);
        osc1.start(now); gain1.gain.setValueAtTime(0.25, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc1.stop(now + 0.4);
        const t2 = now + 0.5;
        const osc2 = this.ctx.createOscillator(); const gain2 = this.ctx.createGain();
        osc2.type = 'sawtooth'; osc2.frequency.setValueAtTime(103.8, t2); osc2.frequency.linearRampToValueAtTime(110.0, t2 + 0.1);
        osc2.connect(gain2); gain2.connect(this.ctx.destination);
        osc2.start(t2); gain2.gain.setValueAtTime(0.25, t2); gain2.gain.exponentialRampToValueAtTime(0.01, t2 + 0.6); osc2.stop(t2 + 0.6);
    },
    playNeutral: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        this.playTone('sine', 523.25, 0.1, now);
        this.playTone('sine', 659.25, 0.1, now + 0.1);
        this.playTone('sine', 783.99, 0.3, now + 0.2);
    },
    // BONUS ROUND FANFARE — ascending C major triad + octave
    playFanfare: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50, 783.99];
        notes.forEach((freq, i) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = "triangle";
            osc.frequency.value = freq;
            osc.connect(gain); gain.connect(this.ctx.destination);
            const start = now + (i * 0.08);
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.linearRampToValueAtTime(0.25, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);
            osc.start(start); osc.stop(start + 0.22);
        });
    },
    // TITLE & INSTRUCTIONS — major triad arpeggio
    playArpeggio: function(baseFreq) {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const third = baseFreq * Math.pow(2, 4/12);
        const fifth = baseFreq * Math.pow(2, 7/12);
        [baseFreq, third, fifth].forEach((freq, i) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = "triangle";
            osc.frequency.value = freq;
            osc.connect(gain); gain.connect(this.ctx.destination);
            const start = now + (i * 0.07);
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.linearRampToValueAtTime(0.25, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.25);
            osc.start(start); osc.stop(start + 0.25);
        });
    },
    // 2P READY SCREEN "START TURN" — high bell (base 700)
    playTurnBell: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const base = 700, upper = base * 2;
        const osc1 = this.ctx.createOscillator(); const g1 = this.ctx.createGain();
        osc1.type = "sine"; osc1.frequency.value = base;
        osc1.connect(g1); g1.connect(this.ctx.destination);
        g1.gain.setValueAtTime(0.0001, now); g1.gain.linearRampToValueAtTime(0.25, now + 0.01);
        g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc1.start(now); osc1.stop(now + 0.12);
        const osc2 = this.ctx.createOscillator(); const g2 = this.ctx.createGain();
        osc2.type = "sine"; osc2.frequency.value = upper;
        osc2.connect(g2); g2.connect(this.ctx.destination);
        const t2 = now + 0.05;
        g2.gain.setValueAtTime(0.0001, t2); g2.gain.linearRampToValueAtTime(0.25, t2 + 0.01);
        g2.gain.exponentialRampToValueAtTime(0.0001, t2 + 0.22);
        osc2.start(t2); osc2.stop(t2 + 0.22);
    },
    // 2P SUBMIT TRANSITION — low bell (base 350)
    playTurnBellLow: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const base = 350, upper = base * 2;
        const osc1 = this.ctx.createOscillator(); const g1 = this.ctx.createGain();
        osc1.type = "sine"; osc1.frequency.value = base;
        osc1.connect(g1); g1.connect(this.ctx.destination);
        g1.gain.setValueAtTime(0.0001, now); g1.gain.linearRampToValueAtTime(0.25, now + 0.01);
        g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc1.start(now); osc1.stop(now + 0.12);
        const osc2 = this.ctx.createOscillator(); const g2 = this.ctx.createGain();
        osc2.type = "sine"; osc2.frequency.value = upper;
        osc2.connect(g2); g2.connect(this.ctx.destination);
        const t2 = now + 0.05;
        g2.gain.setValueAtTime(0.0001, t2); g2.gain.linearRampToValueAtTime(0.25, t2 + 0.01);
        g2.gain.exponentialRampToValueAtTime(0.0001, t2 + 0.22);
        osc2.start(t2); osc2.stop(t2 + 0.22);
    },
    // 2P ANSWER REVEAL — deep neutral bell (base 175)
    playNeutralBell: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const base = 175, upper = base * 2;
        const osc1 = this.ctx.createOscillator(); const g1 = this.ctx.createGain();
        osc1.type = "sine"; osc1.frequency.value = base;
        osc1.connect(g1); g1.connect(this.ctx.destination);
        g1.gain.setValueAtTime(0.0001, now); g1.gain.linearRampToValueAtTime(0.25, now + 0.01);
        g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc1.start(now); osc1.stop(now + 0.12);
        const osc2 = this.ctx.createOscillator(); const g2 = this.ctx.createGain();
        osc2.type = "sine"; osc2.frequency.value = upper;
        osc2.connect(g2); g2.connect(this.ctx.destination);
        const t2 = now + 0.05;
        g2.gain.setValueAtTime(0.0001, t2); g2.gain.linearRampToValueAtTime(0.25, t2 + 0.01);
        g2.gain.exponentialRampToValueAtTime(0.0001, t2 + 0.22);
        osc2.start(t2); osc2.stop(t2 + 0.22);
    },
    // BONUS WIN — G (dotted 8th), G (16th), C (quarter) at ~120 BPM
    playBonusWin: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const G4 = 392.00, C5 = 523.25;
        const notes = [
            { freq: G4, start: 0,     dur: 0.375 },
            { freq: G4, start: 0.375, dur: 0.125 },
            { freq: C5, start: 0.5,   dur: 0.5   }
        ];
        notes.forEach(n => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = "triangle";
            osc.frequency.value = n.freq;
            osc.connect(gain); gain.connect(this.ctx.destination);
            const t = now + n.start;
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.linearRampToValueAtTime(0.25, t + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + n.dur);
            osc.start(t); osc.stop(t + n.dur);
        });
    },
    // 2P BONUS TAG — soft tinkly bell
    playTagBell: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 1200;
        osc.connect(gain); gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(0.25, now + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
    },
    // 2P BONUS TAG — brief bzz for incorrect
    playTagBzz: function() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = 90;
        osc.connect(gain); gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(0.25, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
    }
};

// --- GLOBAL ENTER-KEY SHORTCUT ---
// If exactly one button is visible on the current screen, Enter clicks it.
// Multi-button screens (title, bonus choice, etc.) are naturally excluded.
document.addEventListener("keydown", function(e) {
    if (e.key !== "Enter") return;
    const buttons = document.querySelectorAll("#app button:not([disabled])");
    if (buttons.length === 1) {
        e.preventDefault();
        buttons[0].click();
    }
});

// --- MAIN INIT ---
window.onload = async function() {
    log("Window Loaded. Validating Libraries...");
    if (typeof d3 === 'undefined') { log("D3.js is missing.", 'err'); return; }
    
    log("Libraries OK. Fetching question_data.xlsx...");
    let pinch = [], map = [], bonus = [], draw = [];

    // XLSX LOADER
    try {
        const response = await fetch("question_data.xlsx");
        if (!response.ok) throw new Error("Could not find question_data.xlsx");
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: "array" });
        log("Workbook loaded. Sheets: " + workbook.SheetNames.join(", "));

        // Match sheet names case-insensitively
        const findSheet = keyword => workbook.SheetNames.find(s => s.toLowerCase().includes(keyword));
        const pinchSheet = findSheet("pinch");
        const mapSheet = findSheet("map");
        const bonusSheet = findSheet("bonus");
        const drawSheet = findSheet("draw");

        // Convert sheets to arrays of objects (defval:"" mimics CSV empty-cell behavior)
        if (pinchSheet) {
            log("Reading sheet: " + pinchSheet);
            pinch = XLSX.utils.sheet_to_json(workbook.Sheets[pinchSheet], { defval: "" });
            pinch = pinch.map(d => { let o = {}; Object.keys(d).forEach(k => o[k.trim()] = String(d[k])); o.type = 'pinch'; o.id = o.question_id || o.ID; return o; });
            pinch.forEach(q => {
                const min = +q.min_value; const max = +q.max_value; const width = +q.max_width_units;
                if (width > 0 && width >= (max - min)) Game.errors.push(`PINCH-LINE ERROR: MAX WIDTH OF ${q.id} = TOO LONG.`);
            });
        } else { log("Warning: No 'pinch' sheet found.", 'err'); }

        if (mapSheet) {
            log("Reading sheet: " + mapSheet);
            map = XLSX.utils.sheet_to_json(workbook.Sheets[mapSheet], { defval: "" });
            map = map.map(d => { let o = {}; Object.keys(d).forEach(k => o[k.trim()] = String(d[k])); o.type = 'map'; o.id = o.question_id || o.ID; return o; });
        } else { log("Warning: No 'map' sheet found.", 'err'); }

        if (bonusSheet) {
            log("Reading sheet: " + bonusSheet);
            bonus = XLSX.utils.sheet_to_json(workbook.Sheets[bonusSheet], { defval: "" });
            bonus = bonus.map(d => { let o = {}; Object.keys(d).forEach(k => o[k.trim()] = String(d[k])); o.type = 'bonus'; o.id = o.question_id || o.ID; return o; });
        } else { log("Warning: No 'bonus' sheet found.", 'err'); }

        if (drawSheet) {
            log("Reading sheet: " + drawSheet);
            draw = XLSX.utils.sheet_to_json(workbook.Sheets[drawSheet], { defval: "" });
            draw = draw.map(d => { let o = {}; Object.keys(d).forEach(k => o[k.trim()] = String(d[k])); o.type = 'draw'; o.id = o.question_id || o.ID; return o; });
        } else { log("Warning: No 'draw' sheet found.", 'err'); }

    } catch(e) { log("Error loading question_data.xlsx: " + e.message, 'err'); }

    Game.allQuestions = [...(pinch||[]), ...(map||[]), ...(bonus||[]), ...(draw||[])];

    // DATA PATCH: correct_ids must match the exact fill color in the SVG file,
    // not the color sampled from the source PNG (PNG-to-SVG converters can shift
    // channel values by 1-2). Add any future color corrections here.
    const colorPatches = { 'map_q_A': '#72fe01' };
    Game.allQuestions.forEach(q => { if (colorPatches[q.id]) q.correct_ids = colorPatches[q.id]; });

    if (Game.allQuestions.length === 0) {
        document.getElementById("screen-loading").innerHTML = `<h1>DATA ERROR</h1><p>No question data found. Check question_data.xlsx.</p>`;
        return;
    }

    const shuffle = arr => arr.sort(() => Math.random() - 0.5);
    if(map) shuffle(map); if(bonus) shuffle(bonus); if(draw) shuffle(draw);

    // Split pinch into normal and seasoning pools
    let pinchNormal = [], pinchSeasoning = [];
    if(pinch) {
        pinch.forEach(q => {
            if((q.role || '').trim().toLowerCase() === 'seasoning') pinchSeasoning.push(q);
            else pinchNormal.push(q);
        });
        shuffle(pinchNormal); shuffle(pinchSeasoning);
        log(`Pinch deck: ${pinchNormal.length} normal, ${pinchSeasoning.length} seasoning`);
    }
    // Pinch slots 1 & 2 from normal pool, slot 3 from combined leftover normal + seasoning pool
    const p1 = pinchNormal[0] || null;
    const p2 = pinchNormal[1] || null;
    const slot3Pool = [...pinchNormal.slice(2), ...pinchSeasoning];
    shuffle(slot3Pool);
    const p3 = slot3Pool[0] || null;
    if(p3) log(`Slot 3 pick: ${p3.id} (${(p3.role||'').trim().toLowerCase() === 'seasoning' ? 'SEASONING' : 'normal'}) from pool of ${slot3Pool.length}`);

    Game.deck = [
        p1, (map && map[0]), 
        p2, (draw && draw[0]), 
        p3, (bonus && bonus[0])
    ].filter(Boolean);

    log("Deck Ready. Launching UI.");
    showTitleScreen();
};
