<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CET LAB v7 - HARD CODED</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Barlow&display=swap" rel="stylesheet">

<style>
    body { background: #1a0035; color: white; font-family: 'Barlow', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    h1 { font-family: 'Oswald'; color: #ffd700; margin-bottom: 10px; }
    
    .controls { margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; text-align: center; }
    button { padding: 10px 20px; background: #ffd700; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 16px; }
    button:hover { background: #fff; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }

    #workbench { width: 800px; height: 500px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; position: relative; background: rgba(0,0,0,0.2); }
    svg { width: 100%; height: 100%; }
    path { transition: fill 0.2s; cursor: pointer; stroke: white; stroke-width: 1px; fill: rgba(255,255,255,0.1); }
    path:hover { fill: rgba(255,255,255,0.2) !important; }
    
    #log { margin-top: 20px; font-family: monospace; color: #0f0; max-height: 200px; overflow-y: auto; width: 800px; background: #000; padding: 10px; border: 1px solid #333; }
</style>
</head>
<body>

<h1>COMPONENT LAB v7 (HARD CODED)</h1>

<div class="controls">
    <button id="btnLoad" onclick="initData()">1. LOAD CSV DATA</button>
    <br><br>
    <button class="caseBtn" disabled onclick="renderUS_Missouri()">2. Missouri (US Engine)</button>
    <button class="caseBtn" disabled onclick="renderWorld_Paraguay()">3. S. America (World Engine)</button>
    <button class="caseBtn" disabled onclick="renderNYC()">4. NYC (City Engine)</button>
</div>

<div id="workbench">
    <div style="opacity:0.5;">Waiting for Data...</div>
</div>

<div id="log">System Ready.</div>

<script>
    let mapData = [];
    
    function log(msg) {
        const el = document.getElementById("log");
        el.innerHTML += `<div>> ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    async function initData() {
        try {
            const mRaw = await d3.csv("map_questions.csv");
            mapData = mRaw.map(d => ({...d, id: d.question_id || d.ID}));
            log("CSV Loaded.");
            document.querySelectorAll(".caseBtn").forEach(b => b.disabled = false);
        } catch(e) { log("Error: " + e.message); }
    }

    // --- ENGINE 1: US STATES (Curved Albers) ---
    function renderUS_Missouri() {
        const q = mapData.find(d => d.id === 'map_q_2'); // Missouri
        setupBox("Fetching Official US Atlas...");

        d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(topology => {
            // 1. Get Features
            let features = topojson.feature(topology, topology.objects.states).features;
            
            // 2. Filter using CSV names
            // Note: The CDN file matches names perfectly
            const whitelist = q.visible_ids.split(",").map(s => s.trim());
            features = features.filter(f => whitelist.includes(f.properties.name));

            // 3. Render with ALBERS USA
            renderFeatures(features, d3.geoAlbersUsa());
            log("Rendered US States using AlbersUSA.");
        });
    }

    // --- ENGINE 2: WORLD (Natural Earth) ---
    function renderWorld_Paraguay() {
        const q = mapData.find(d => d.id === 'map_q_4'); // Paraguay
        setupBox("Fetching Official World Atlas...");

        // Use the file that definitely has names
        d3.json("https://raw.githubusercontent.com/deldersveld/topojson/master/world-countries.json").then(topology => {
            let features = topojson.feature(topology, topology.objects.countries1).features;
            
            const whitelist = q.visible_ids.split(",").map(s => s.trim());
            features = features.filter(f => whitelist.includes(f.properties.name));

            // Render with Natural Earth
            renderFeatures(features, d3.geoNaturalEarth1());
            log("Rendered World using NaturalEarth1.");
        });
    }

    // --- ENGINE 3: NYC (Mercator) ---
    function renderNYC() {
        const q = mapData.find(d => d.id === 'map_q_5'); // NYC
        setupBox("Fetching Local NYC JSON...");

        d3.json("nyc_boroughs.json").then(topology => {
            // Auto-detect key for local file
            const key = Object.keys(topology.objects)[0];
            let features = topojson.feature(topology, topology.objects[key]).features;
            
            if(q.visible_ids) {
                const whitelist = q.visible_ids.split(",").map(s => s.trim());
                features = features.filter(f => whitelist.includes(f.properties.name));
            }

            // NYC is usually Lat/Long, so Mercator is best
            renderFeatures(features, d3.geoMercator());
            log("Rendered NYC using Mercator.");
        }).catch(err => {
            log("NYC Error: " + err.message);
            document.getElementById("workbench").innerHTML = "Missing nyc_boroughs.json";
        });
    }

    // --- CORE RENDERER ---
    function setupBox(msg) {
        document.getElementById("workbench").innerHTML = `<div style="opacity:0.7">${msg}</div>`;
    }

    function renderFeatures(features, projection) {
        const width = 800, height = 500;
        const box = document.getElementById("workbench");
        box.innerHTML = "";
        
        const svg = d3.select("#workbench").append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`);

        // CRITICAL: FitSize forces the projection to zoom into the specific states/countries we filtered
        projection.fitSize([width, height], {type:"FeatureCollection", features:features});
        
        const path = d3.geoPath().projection(projection);

        svg.selectAll("path")
            .data(features)
            .join("path")
            .attr("d", path)
            .on("click", function(e, d) {
                d3.select(this).style("fill", "#ffd700");
                log("Clicked: " + d.properties.name);
            });
    }
</script>

</body>
</html>
