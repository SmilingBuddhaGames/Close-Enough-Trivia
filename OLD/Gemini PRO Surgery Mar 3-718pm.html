<style>
:root{
--gold:#ffd700;
--gold-dark:#9a6800;
--purple-deep:#110025;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Barlow',sans-serif;
background:linear-gradient(150deg,#5a0a9e 0%,#1a0035 60%,#0d001f 100%);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

#app{
width:95%;
max-width:1200px;
position:relative;
z-index:1;
padding:30px 0;
opacity: 0;
transition: opacity 0.5s ease;
}

/* VISIBLE DEBUG CONSOLE */
#debugLog {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 150px;
    background: rgba(0,0,0,0.9);
    color: #00ff00;
    font-family: monospace;
    padding: 10px;
    font-size: 14px;
    z-index: 99999;
    overflow-y: auto;
    border-top: 2px solid #555;
    display: none; /* Hidden by default, shown on error */
}

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
min-height:65vh;
