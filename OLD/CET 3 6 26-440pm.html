<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLOSE ENOUGH TRIVIA - BUILD v32 (LOGIC REFACTOR)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<style>
/* --- THEME: NEON NOIR --- */
:root { --gold: #ffd700; --gold-dark: #9a6800; --bg-gradient: linear-gradient(150deg, #5a0a9e 0%, #1a0035 60%, #0d001f 100%); }

* { box-sizing: border-box; user-select: none; }
body { margin: 0; font-family: 'Barlow', sans-serif; background: var(--bg-gradient); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

#app { width: 95%; max-width: 1200px; padding: 20px; text-align: center; position: relative; }

/* TYPOGRAPHY */
h1 { font-family: 'Oswald', sans-serif; font-size: 54px; color: var(--gold); text-transform: uppercase; margin: 0 0 4px 0; text-shadow: 0 0 30px rgba(255,215,0,0.4); line-height: 1.05; letter-spacing: 2px; }

.nerd-label { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,215,0,0.6); margin-bottom: 14px; }
.proto-label { font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 4px; color: rgba(255,255,255,0.35); margin-top: 8px; margin-bottom: 30px; }

.center-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 65vh; gap: 24px; }

h2 { font-family: 'Oswald', sans-serif; font-size: 48px; line-height: 1.4; margin: 0 0 20px 0; font-weight: 600; letter-spacing: 1px; }

.answer-text { font-family: 'Barlow', sans-serif; font-size: 40px; font-weight: 500; line-height: 1.3; margin: 20px 0; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

.hint { font-style: italic; opacity: 0.8; font-size: 24px; margin-bottom: 20px; min-height: 24px; line-height: 1.4; }
.ppn-display { font-family: 'Oswald', sans-serif; font-size: 48px; color: var(--gold); margin: 5px 0; }
.ppn-label { font-family: 'Oswald', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 5px; margin-top: 15px; }
.selection-display { font-family: 'Oswald', sans-serif; font-size: 28px; color: white; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

button {
    padding: 15px 30px; font-family: 'Oswald', sans-serif; font-size: 20px; text-transform: uppercase;
    border: none; border-radius: 8px; background: linear-gradient(to bottom, #ffd700, #e09800); color: #160030;
    cursor: pointer; margin: 10px; box-shadow: 0 5px 0 var(--gold-dark); transition: transform 0.1s;
}
button:active { transform: translateY(4px); box-shadow: none; }

.screen-container { display: flex; flex-wrap: wrap; background: rgba(0,0,0,0.25); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; min-height: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.left-panel { flex: 1.2; padding: 40px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid rgba(255,255,255,0.1); min-width: 400px; text-align: left; }
.right-panel { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-width: 350px; background: rgba(0,0,0,0.1); }

#mapBox, #resultMapBox { width: 100%; height: 400px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); }

/* GEO MAPS STYLES */
path { transition: fill 0.2s; cursor: pointer; stroke: white; stroke-width: 0.5px; fill: rgba(255,255,255,0.05); }
path:hover { fill: rgba(255,255,255,0.2) !important; }

/* IMAGE MAP CLASSES */
.map-layer * { transition: fill-opacity 0.2s; }
.correct-highlight-path { fill: #ffd700 !important; fill-opacity: 0.75 !important; stroke: white !important; stroke-width: 4px !important; }

/* RESULTS STYLES */
.score-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin: 5px; flex: 1; border: 1px solid rgba(255,215,0,0.3); }
.score-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; margin-bottom: 5px; }
.score-val { font-family: 'Oswald'; font-size: 60px; color: var(--gold); }
.map-reveal-label { font-family: 'Oswald'; font-size: 24px; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; }

/* BONUS STYLES */
.bonus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; text-align: left; margin-bottom: 20px; }
.bonus-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 6px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; font-size: 18px; }
.bonus-item.active { background: #ffd700; color: black; font-weight: bold; }
.bonus-result-container { display: flex; width: 100%; gap: 20px; margin-top: 20px; text-align: left; }
.bonus-col { flex: 1; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
.bonus-col h3 { font-family: 'Oswald'; color: var(--gold); margin: 0 0 10px 0; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

/* DEBUG */
.debug-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; padding: 40px; overflow-y: auto; }
.debug-overlay.active { display: block; }
.debug-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
.debug-item { background: #333; padding: 15px; border-radius: 5px; cursor: pointer; border: 1px solid #555; }
.debug-btn { background: #333; color: #aaa; font-size: 14px; padding: 10px 20px; margin-top: 30px; border: 1px solid #555; }

#bootLog { font-family: monospace; color: #00ff00; background: rgba(0,0,0,0.95); padding: 10px; text-align: left; position: fixed; bottom: 10px; right: 10px; border-radius: 5px; font-size: 10px; pointer-events: none; z-index: 99999; border: 1px solid #333; }
</style>
</head>
<body>

<div id="app">
    <div id="screen-loading">
        <h1>System Initializing...</h1>
        <div class="hint">Attempting to connect...</div>
    </div>
</div>

<div id="debugMenu" class="debug-overlay">
    <button onclick="document.getElementById('debugMenu').classList.remove('active')">CLOSE</button>
    <h1>DEBUG DATABASE</h1>
    <div id="debugList" class="debug-grid"></div>
</div>

<div id="bootLog">Browser Check...</div>

<script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://unpkg.com/topojson@3.0.2/dist/topojson.min.js"></script>

<script>
// --- UTILS ---
function rgbToHex(rgb) {
    if (!rgb || rgb.startsWith('#')) return rgb;
    const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
    if (!match) return rgb;
    function hex(x) { return ("0" + parseInt(x).toString(16)).slice(-2); }
    return "#" + hex(match[1]) + hex(match[2]) + hex(match[3]);
}

function log(msg, type='') {
    const el = document.getElementById("bootLog");
    if(!el) return;
    const color = type === 'err' ? '#ff5555' : '#00ff00';
    el.innerHTML = `<span style="color:${color}">> ${msg}</span><br>` + el.innerHTML;
}

// --- GAME STATE ---
const Game = {
    deck: [], index: 0,
    allQuestions: [],
    scores: [0, 0], player: 0, mode: 1, tempScore: 0, 
    colors: { gold: '#ffd700' },
    errors: [],
    savedBonus: null,
    lastMapFeatures: null,
    correctRegionIDs: [] // Answer key for custom images
};

// --- MAIN INIT ---
window.onload = async function() {
    log("Window Loaded.");
    try {
        const pinch = await d3.csv("SPREADSHEETS/pinch_questions.csv");
        const map = await d3.csv("SPREADSHEETS/map_questions.csv");
        const bonus = await d3.csv("SPREADSHEETS/bonus_questions.csv");

        Game.allQuestions = [
            ...(pinch || []).map(d => ({...d, type:'pinch', id: d.question_id})),
            ...(map || []).map(d => ({...d, type:'map', id: d.question_id})),
            ...(bonus || []).map(d => ({...d, type:'bonus', id: d.question_id}))
        ];

        const shuffle = arr => arr.sort(() => Math.random() - 0.5);
        const pQ = shuffle(pinch || []);
        const mQ = shuffle(map || []);
        const bQ = shuffle(bonus || []);

        Game.deck = [pQ[0], mQ[0], pQ[1], pQ[2], mQ[1], bQ[0]].filter(Boolean);
        showTitleScreen();
    } catch(e) { log("CSV Load Error: " + e.message, 'err'); }
};

function showTitleScreen() {
    document.getElementById("app").innerHTML = `
        <div class="nerd-label">For Both Nerds & Normies, it's...</div>
        <h1>Close Enough<br>Trivia</h1>
        <div class="proto-label">PROTOTYPE</div>
        <button onclick="startGame(1)">1 Player</button>
        <button onclick="startGame(2)">2 Players</button><br>
        <button class="debug-btn" onclick="openDebug()">DEBUG DATABASE</button>
    `;
}

function openDebug() {
    const list = document.getElementById("debugList");
    list.innerHTML = "";
    Game.allQuestions.forEach(q => {
        const el = document.createElement("div");
        el.className = "debug-item";
        el.innerHTML = `<strong>${q.id}</strong><br>${q.type}`;
        el.onclick = () => { document.getElementById("debugMenu").classList.remove("active"); Game.deck = [q]; startGame(1); };
        list.appendChild(el);
    });
    document.getElementById("debugMenu").classList.add("active");
}

function startGame(mode) {
    AudioEngine.init();
    Game.mode = mode; Game.scores = [0,0]; Game.player = 0; Game.index = 0;
    nextTurn();
}

function nextTurn() {
    if (Game.index >= Game.deck.length) { showGameOver(); return; }
    if (Game.mode === 2 && Game.player === 0) {
        document.getElementById("app").innerHTML = `<h1>Player ${Game.player + 1}</h1><button onclick="renderQuestion()">Start Turn</button>`;
    } else {
        renderQuestion();
    }
}

function renderQuestion() {
    const q = Game.deck[Game.index];
    const app = document.getElementById("app");
    app.innerHTML = "";
    if(q.type === 'pinch') renderPinch(q, app);
    else if(q.type === 'map') renderMap(q, app);
    else if(q.type === 'bonus') renderBonusIntro(q, app);
}

// --- PINCH RENDERER ---
function renderPinch(q, container) {
    container.innerHTML = `
        <div class="screen-container">
            <div class="left-panel"><h2>${q.question_text}</h2></div>
            <div class="right-panel">
                <div class="selection-display" id="selectionDisp">SELECTED: 0</div>
                <div id="rulerContainer" style="width:100%; height:180px; background:rgba(0,0,0,0.2); position:relative;"></div>
                <div class="ppn-label">Potential Points</div>
                <div class="ppn-display" id="ppnDisplay">0</div>
                <button id="submitPinch">SUBMIT ANSWER</button>
            </div>
        </div>
    `;

    const min = +q.min_value, max = +q.max_value, trueVal = +q.true_value;
    const width = 600, height = 150;
    const svg = d3.select("#rulerContainer").append("svg").attr("viewBox", `0 0 ${width} ${height}`).style("width","100%").style("height","100%");
    const x = d3.scaleLinear().domain([min, max]).range([20, width-20]);

    // Restore Yellow Frame Appearance
    const bar = svg.append("rect")
        .attr("y", 30).attr("height", 50)
        .style("fill", "rgba(255,215,0,0.3)")
        .style("stroke", "#ffd700")
        .style("stroke-width", "3px")
        .style("cursor", "grab");

    let l = +q.default_start || min, r = +q.default_end || max;

    function update() {
        const pxW = Math.max(15, x(r) - x(l));
        bar.attr("x", x(l)).attr("width", pxW);
        const ppn = Math.max(5, Math.round(100 - ((r-l)/(max-min)*100)));
        document.getElementById("ppnDisplay").innerText = ppn;
        document.getElementById("selectionDisp").innerText = `SELECTED: ${Math.round(l)} - ${Math.round(r)}`;
        return ppn;
    }
    update();

    bar.call(d3.drag().on("drag", (e) => {
        const dx = (e.dx * (max-min)) / width;
        l = Math.max(min, Math.min(max, l + dx));
        r = Math.max(min, Math.min(max, r + dx));
        update();
        AudioEngine.playClick(100);
    }));

    document.getElementById("submitPinch").onclick = () => {
        const win = (trueVal >= l && trueVal <= r);
        showResult(win ? update() : 0, q.answer_text, q);
    };
}

// --- MAP RENDERER ---
function renderMap(q, container) {
    container.innerHTML = `
        <div class="screen-container">
            <div class="left-panel"><h2>${q.question_text}</h2><div class="hint">Select up to ${q.max_selectable} regions.</div></div>
            <div class="right-panel">
                <div id="mapBox"></div>
                <div class="ppn-label">Potential Points</div>
                <div class="ppn-display" id="mapPpn">0</div>
                <button id="submitMap">SUBMIT ANSWER</button>
            </div>
        </div>
    `;

    const selectedIDs = new Set();
    const limit = +q.max_selectable || 9;
    Game.correctRegionIDs = []; // Reset answer key

    if (q.geo_source === 'custom_image') {
        d3.xml(q.svg_file).then(xml => {
            const svgDoc = xml.documentElement;
            const viewBox = svgDoc.getAttribute("viewBox") || "0 0 600 400";
            const mainSvg = d3.select("#mapBox").append("svg")
                .attr("viewBox", viewBox).style("width","100%").style("height","100%");

            mainSvg.append("image").attr("href", q.image_file).attr("width", "100%").attr("height", "100%");

            const mapLayer = mainSvg.append("g").attr("class", "map-layer");
            const importedNodes = document.importNode(svgDoc, true);
            Array.from(importedNodes.children).forEach(node => mapLayer.node().appendChild(node));

            const correctColor = (q.correct_ids || "").toLowerCase();

            mapLayer.selectAll("path, rect, circle, polygon, ellipse")
                .attr("fill-opacity", "0.01")
                .attr("stroke", "black").attr("stroke-width", "4px")
                .each(function(d, i) {
                    const uid = "reg_" + i;
                    d3.select(this).attr("id", uid);
                    
                    // CRITICAL: Determine correctness by color ONCE on load
                    const rawFill = this.getAttribute("fill") || this.style.fill;
                    if (rgbToHex(rawFill).toLowerCase() === correctColor) {
                        Game.correctRegionIDs.push(uid);
                    }
                })
                .on("click", function() {
                    const el = d3.select(this);
                    const id = el.attr("id");
                    if (selectedIDs.has(id)) {
                        selectedIDs.delete(id);
                        el.style("fill", null).attr("fill-opacity", "0.01");
                    } else if (selectedIDs.size < limit) {
                        selectedIDs.add(id);
                        el.style("fill", "#ffd700").attr("fill-opacity", "0.75");
                        AudioEngine.playMapClick(selectedIDs.size, true);
                    }
                    const pts = 100 - (Math.max(0, selectedIDs.size - 1) * 10);
                    document.getElementById("mapPpn").innerText = selectedIDs.size > 0 ? pts : 0;
                });
        });

        document.getElementById("submitMap").onclick = () => {
            let win = false;
            selectedIDs.forEach(id => { if(Game.correctRegionIDs.includes(id)) win = true; });
            const pts = win ? (100 - (Math.max(0, selectedIDs.size - 1) * 10)) : 0;
            let ansText = q.question_id === 'map_q_A' ? "THIS IS THE YOKE" : q.correct_ids;
            showResult(pts, ansText, q);
        };
    } else {
        // Standard Geo Maps Logic (simplified for space)
        d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(data => {
            // ... (Standard Geo logic omitted for brevity, focusing on the Jeans fix)
        });
    }
}

function showResult(pts, ansText, q) {
    if(pts > 0) AudioEngine.playWin(); else AudioEngine.playLoss();
    Game.scores[Game.player] += pts;
    
    let header = pts > 0 ? "CORRECT! YOU GOT..." : "SORRY, YOU GOT...";
    const app = document.getElementById("app");

    app.innerHTML = `
        <h1>${header}</h1>
        <h2>+${pts} Points</h2>
        <div id="resultMapBox"></div>
        <div class="answer-text">${ansText}</div>
        <button onclick="advanceTurn()">CONTINUE</button>
    `;

    if (q.type === 'map' && q.geo_source === 'custom_image') {
        d3.xml(q.svg_file).then(xml => {
            const svgDoc = xml.documentElement;
            const resSvg = d3.select("#resultMapBox").append("svg")
                .attr("viewBox", svgDoc.getAttribute("viewBox")).style("width","80%").style("height","300px");
            
            resSvg.append("image").attr("href", q.image_file).attr("width", "100%").attr("height", "100%");
            const layer = resSvg.append("g");
            Array.from(document.importNode(svgDoc, true).children).forEach(n => layer.node().appendChild(n));
            
            const correctColor = (q.correct_ids || "").toLowerCase();
            layer.selectAll("*")
                .attr("fill", "transparent").attr("stroke", "white").attr("stroke-width", "2px")
                .each(function() {
                    const fill = this.getAttribute("fill") || this.style.fill;
                    if (rgbToHex(fill).toLowerCase() === correctColor) {
                        d3.select(this).style("fill", "#ffd700").style("fill-opacity", "0.75").attr("stroke", "black").attr("stroke-width", "4px");
                    }
                });
        });
    }
}

function advanceTurn() {
    if (Game.mode === 2) {
        if (Game.player === 0) { Game.player = 1; }
        else { Game.player = 0; Game.index++; }
    } else { Game.index++; }
    nextTurn();
}

// --- AUDIO ---
const AudioEngine = {
    ctx: null,
    init: function() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    playTone: function(f, d) {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.connect(g); g.connect(this.ctx.destination);
        o.frequency.value = f; o.start(); g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + d); o.stop(this.ctx.currentTime + d);
    },
    playClick: function() { this.playTone(400, 0.05); },
    playMapClick: function() { this.playTone(600, 0.1); },
    playWin: function() { this.playTone(800, 0.3); },
    playLoss: function() { this.playTone(200, 0.5); },
    playFanfare: function() { this.playTone(1000, 0.5); }
};

function showGameOver() {
    document.getElementById("app").innerHTML = `<h1>GAME OVER</h1><div class="ppn-display">Final Score: ${Game.scores[0]}</div><button onclick="location.reload()">PLAY AGAIN</button>`;
}
</script>
</body>
</html>
